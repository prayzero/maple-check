  if (!Array.isArray(saved)) return JSON.parse(JSON.stringify(DEFAULT_BOSSES));
  const savedMap = {};
  for (const b of saved) savedMap[b.id] = b;
  return DEFAULT_BOSSES.map(def => savedMap[def.id] || JSON.parse(JSON.stringify(def)));
};

const fmtMeso = (n) => {
  if (!n || n === 0) return '0 메소';
  const eok = Math.floor(n / 100000000);
  const man = Math.floor((n % 100000000) / 10000);
  const won = n % 10000;
  const parts = [];
  if (eok) parts.push(`${eok.toLocaleString()}억`);
  if (man) parts.push(`${man.toLocaleString()}만`);
  if (!eok && !man && won) parts.push(won.toLocaleString());
  return (parts.join(' ') || '0') + ' 메소';
};

// 분 → "X시간 Y분" / "Y분"
const fmtMinutes = (m) => {
  m = Math.max(0, Math.round(m || 0));
  if (m === 0) return '0분';
  const h = Math.floor(m / 60), mm = m % 60;
  return (h ? `${h}시간 ` : '') + (mm || !h ? `${mm}분` : '').trim();
};

const todayStr = () => {
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
};

const daysUntil = (dateStr) => {
  if (!dateStr) return null;
  const t = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.ceil((t - today) / (1000 * 60 * 60 * 24));
};

/* =========================================================

 * SF_TABLE[성] = [기본 성공률, 실패 후 조건부 파괴율, 비용 분모]
 * - 스타캐치 삭제 → 성공률 ×1.05 상시 적용(계산에서 처리)
 * ========================================================= */
const SF_TABLE = [
  [0.95,0,36],[0.90,0,36],[0.85,0,36],[0.85,0,36],[0.80,0,36],
  [0.75,0,36],[0.70,0,36],[0.65,0,36],[0.60,0,36],[0.55,0,36],

];
// 온전 복구 메소 (파괴 성 15~22 × 장비 레벨 140/160/200/250)
const SF_RESTORE = {
  140:{15:149000000,16:359000000,17:606000000,18:1380000000,19:2280000000,20:4020000000,21:5050000000,22:8290000000},
  160:{15:222000000,16:535000000,17:904000000,18:2060000000,19:3410000000,20:6000000000,21:7540000000,22:12400000000},
  200:{15:433000000,16:1050000000,17:1770000000,18:4010000000,19:6650000000,20:11800000000,21:14800000000,22:24200000000},
  250:{15:846000000,16:2040000000,17:3450000000,18:7830000000,19:13000000000,20:22900000000,21:28800000000,22:47300000000},
};
const sfMaxStar = (lvl) => lvl <= 94 ? 5 : lvl <= 107 ? 8 : lvl <= 117 ? 10 : lvl <= 127 ? 15 : lvl <= 137 ? 20 : 30;
const round100 = (x) => Math.round(x / 100) * 100;

/* 스타포스 기대비용 (엑셀 계산기 로직 1:1 포팅)
 * - 12성 복구: 파괴 시 12성으로 복귀 → 12~(n-1)성 재등반 비용/시도(선택 전략 기준)가 재귀 포함
 * - 흔적 복구: 파괴 성 유지, 온전 복구 메소 + 동일장비 K개 소모
 * - 파괴방지: 15~17성, 기본 클릭비 200% 추가
 * opt: { level, from, to, spare, mvp(0/0.03/0.05/0.1), pcRoom, disc30,
 *        ev51015, boomReduce30, restoreDisc20, recover('spare12'|'restore'|'auto'),
 *        guard('none'|'all1517'|'auto') } */
const sfExpect = (o) => {
  const lvl = o.level;
  const hasRestore = !!SF_RESTORE[lvl];
  const rows = [];
  let cumP = 0, cumR = 0, cumS = 0, cumT = 0, cumU = 0; // 12성부터의 누적 (재등반용)
  for (let n = 0; n < 30; n++) {
    const [base, cond, denom] = SF_TABLE[n];
    const succ = (o.ev51015 && (n === 5 || n === 10 || n === 15)) ? 1 : Math.min(1, base * 1.05);
    const boom = succ === 1 ? 0 : (1 - succ) * cond * ((o.boomReduce30 && n <= 21) ? 0.7 : 1);
    const H = round100(1000 + Math.pow(lvl, 3) * Math.pow(n + 1, n <= 9 ? 1 : 2.7) / denom);
    const I = round100(H * (n < 17 ? 1 - o.mvp - (o.pcRoom ? 0.05 : 0) : 1) * (o.disc30 ? 0.7 : 1));
    const J = I + H * 2;
    const K = n < 15 ? 0 : n <= 18 ? 1 : n <= 20 ? 2 : n === 21 ? 3 : 4;
    const L = n < 15 ? 0 : (hasRestore ? (SF_RESTORE[lvl][Math.min(n, 22)] || 0) * (o.restoreDisc20 ? 0.8 : 1) : 0);
    const M = n < 15 ? I / succ : (I + boom * (o.spare + cumP)) / succ;
    const N = (n < 15 || !hasRestore) ? Infinity : (I + boom * (L + K * o.spare)) / succ;
    const O = (n >= 15 && n <= 17) ? J / succ : Infinity;
    let P;
    if (n < 15) P = M;
    else if (o.guard === 'all1517' && n <= 17) P = O;
    else if (o.guard === 'none') P = o.recover === 'spare12' ? M : o.recover === 'restore' ? N : Math.min(M, N);
    else P = o.recover === 'spare12' ? Math.min(M, O) : o.recover === 'restore' ? Math.min(N, O) : Math.min(M, N, O);
    const Q = n < 15 ? '일반' : P === O ? '파괴방지' : P === N ? '흔적 복구' : '12성 복구';
    const R = n < 15 ? I / succ : Q === '파괴방지' ? J / succ : Q === '흔적 복구' ? (I + boom * L) / succ : (I + boom * cumR) / succ;
    const S = n < 15 ? 0 : Q === '파괴방지' ? 0 : Q === '흔적 복구' ? boom * K / succ : boom * (1 + cumS) / succ;
    const T = n < 15 ? 1 / succ : Q === '파괴방지' ? 1 / succ : Q === '흔적 복구' ? 1 / succ : (1 + boom * cumT) / succ;
    const U = (n < 15 || Q === '파괴방지') ? 0 : Q === '흔적 복구' ? boom / succ : boom * (1 + cumU) / succ;
    if (n >= 12) { cumP += P; cumR += R; cumS += S; cumT += T; cumU += U; }
    rows.push({ star: n, strategy: Q, P, R, S, T, U });
  }
  const res = { total: 0, meso: 0, equips: 0, tries: 0, booms: 0, rows: [] };
  for (let n = o.from; n < o.to; n++) {
    const r = rows[n];
    res.total += r.P; res.meso += r.R; res.equips += r.S; res.tries += r.T; res.booms += r.U;
    res.rows.push({ star: n, strategy: r.strategy, cost: r.P });
  }
  return res;
};

/* =========================================================
 * 정밀 큐브 목표옵션 (KMS 공식 API 확률, 2026-07-13) — cube-options.json 지연 로드
 * data = { parts:[[name,id]], options:[[text,rg,maxlines]], dists:[[[optIdx,prob]]], ctx:{numkey:[d1,d2,d3]} }
 * numeric_lookup_key = method(0/1e7) + 레전드리(4e6) + part×1e4 + 대표레벨
 * ========================================================= */
const CUBE_REP_LEVEL = (L) => L <= 9 ? 0 : L <= 120 ? (L % 10 === 0 ? L : Math.floor(L / 10) * 10 + 1) : L <= 200 ? 120 : 201;
const cubeContextKey = (method, partId, level) => (method === 'black' ? 0 : 10000000) + 4000000 + partId * 10000 + CUBE_REP_LEVEL(level);
const CUBE_RGROUPS = [['usable_skill', 1], ['after_hit_invincibility', 1], ['on_hit_damage_ignore', 2], ['on_hit_invincibility', 2]];

// picks = [pick1,pick2,pick3]; 각 pick = 옵션 전역 인덱스(number) | 'any'(무시) | null(미선택)
function cubeExactRoll(data, method, partId, level, picks) {
  const ctx = data && data.ctx[String(cubeContextKey(method, partId, level))];
  if (!ctx) return { ok: false, reason: 'no-context', lines: [], perRoll: 0 };
  const dists = ctx.map(di => di >= 0 ? data.dists[di] : null);
  const rawProb = (d, o) => { if (!d || o == null) return 0; const r = d.find(x => x[0] === o); return r ? r[1] : 0; };
  const groupMass = (d, rg) => { if (!d || !rg) return 0; let s = 0; for (const [oi, p] of d) if ((data.options[oi][1] || '') === rg) s += p; return s; };
  const priorRG = []; const lines = []; let complete = true;
  for (let li = 0; li < 3; li++) {
    const d = dists[li], o = picks[li];
    if (o === 'any') { lines.push({ any: true, p: 1, present: true }); continue; }
    if (o == null) { complete = false; lines.push({ p: 0, present: false }); continue; }
    const raw = rawProb(d, o);
    let excl = 0;
    for (const [g, maxl] of CUBE_RGROUPS) if (priorRG.filter(x => x === g).length >= maxl) excl += groupMass(d, g);
    const oRG = data.options[o][1] || '', oMax = data.options[o][2];
    let p;
    if (oRG && priorRG.filter(x => x === oRG).length >= oMax) p = 0;
    else if (1 - excl <= 0) p = 0;
    else p = raw / (1 - excl);
    lines.push({ raw, excl, p, present: raw > 0, rg: oRG });
    if (oRG) priorRG.push(oRG);
  }
  return { ok: true, lines, perRoll: lines[0].p * lines[1].p * lines[2].p, complete };
}

// 등급업 단계 (천장·연속실패 반영) — 계산 보조 H22:J24. targetGrade에서 멈춤(기본 레전드리)
function cubeGradeUp({ method, level, curGrade, targetGrade = '레전드리', fails }) {
  const gi = g => GRADES.indexOf(g);
  const way = method === 'black' ? 'normal' : 'addi';
  const tierKey = method === 'black' ? '메소 일반/블랙' : '메소 에디';
  const stepsDef = [['레어', '에픽', 'r2e'], ['에픽', '유니크', 'e2u'], ['유니크', '레전드리', 'u2l']];
  const failArr = [fails.r2e || 0, fails.e2u || 0, fails.u2l || 0];
  let tries = 0, meso = 0; const rows = [];
  stepsDef.forEach(([a, b, k], idx) => {
    if (gi(curGrade) <= gi(a) && gi(a) < gi(targetGrade)) {
      const [p, pity] = CUBE_TIERUP[tierKey][k];
      const f = gi(curGrade) === gi(a) ? failArr[idx] : 0;
      const remain = pity - f;
      const t = remain > 0 ? (1 - Math.pow(1 - p, remain)) / p : 0;
      const cost1 = cubeMesoCost(way, level, a);
      tries += t; meso += t * cost1; rows.push({ from: a, to: b, tries: t, meso: t * cost1 });
    }
  });
  return { tries, meso, rows, way };
}

}

const CUBE_PREF_BY_LINE = [
  ['공격력 +12%', '마력 +12%', 'STR +12%', 'DEX +12%', 'INT +12%', 'LUK +12%', '올스탯 +9%', '크리티컬 데미지 +8%'],

];
// 현재 문맥의 줄별 옵션 목록 (확률 내림차순). 없으면 null
const cubeLineRows = (cube, method, partId, level) => {
  if (!cube) return null;
  const ctx = cube.ctx[String(cubeContextKey(method, partId, level))];
  if (!ctx) return null;
  return ctx.map(di => di < 0 ? [] : cube.dists[di]
    .map(([oi, p]) => ({ idx: oi, text: cube.options[oi][0], prob: p }))
    .sort((a, b) => b.prob - a.prob));
};
const cubePickStrong = (rows, li) => {
  for (const key of CUBE_PREF_BY_LINE[li]) { const m = rows.find(r => r.text.includes(key)); if (m) return m.idx; }
  return rows.length ? rows[0].idx : 'any';
};

const presetLineCount = (t) => {
  if (!t) return 3;
  if (/3줄|크크주|3초주|4초주|5초|6초|1초주주/.test(t)) return 3;
  if (/2줄|크크|아확|올이탈|3줄이탈|2초주주|1초주/.test(t)) return 2;
  if (/1초/.test(t)) return 1;

};
// 슬롯 자동 잠재 비용: 등급업(cur→target) + 목표 N줄(부위별 강옵) 통합 기대 메소
const cubeAutoPotentialCost = ({ cube, method, partId, level, curGrade, targetGrade, nLines }) => {
  const gi = (g) => GRADES.indexOf(g);
  if (gi(targetGrade) < 0) return { ok: false };
  const gup = cubeGradeUp({ method, level, curGrade, targetGrade, fails: {} });
  const rows = cubeLineRows(cube, method, partId, level);
  const way = method === 'black' ? 'normal' : 'addi';
  const costL = cubeMesoCost(way, level, targetGrade);
  let targetMeso = 0, H = 0;
  if (rows && targetGrade === '레전드리') {
    const picks = rows.map((r, li) => li < nLines ? cubePickStrong(r, li) : 'any');
    const roll = cubeExactRoll(cube, method, partId, level, picks);
    H = roll.perRoll;
    const upgrading = gi(curGrade) < gi('레전드리');
    const tries = H > 0 ? (upgrading ? (1 - H) / H : 1 / H) : 0;
    targetMeso = tries * costL;
  }
  return { ok: true, gupMeso: gup.meso, targetMeso, total: gup.meso + targetMeso, H, nLines };
};

    for (const k of Object.keys(def.tiers)) {

        activeTiers.push(Number(k));

    const maxTier = Math.max(0, ...Object.keys(def.tiers).map(Number));
    sets.push({ sid, name: def.name, count: cnt, maxTier, activeTier: Math.min(cnt, maxTier), sum });

  sets.sort((a, b) => b.count - a.count);

    arcane: Object.fromEntries(ARCANE_REGIONS.map(r => [r.id, { cur: '', tgt: '' }])),
    authentic: Object.fromEntries(AUTHENTIC_REGIONS.map(r => [r.id, { cur: '', tgt: '' }])),
    grand: Object.fromEntries(GRAND_REGIONS.map(r => [r.id, { cur: '', tgt: '' }])),
    priority: 0, done: false,
  },
  solErda: { erdaCur: '', erdaTgt: '', fragCur: '', fragTgt: '', fragPrice: '', cost: 0, priority: 0, done: false },
  hexa: [false, false, false],
  setMemo: '',
});
const normalizeChar = (c) => ({
  ...c,
  equipment: c.equipment || {},
  goals: c.goals ? {
    level: { current: '', target: '', percent: '', ...(c.goals.level || {}) },
    symbols: {
      arcane: { ...emptyGoals().symbols.arcane, ...(c.goals.symbols?.arcane || {}) },
      authentic: { ...emptyGoals().symbols.authentic, ...(c.goals.symbols?.authentic || {}) },
      grand: { ...emptyGoals().symbols.grand, ...(c.goals.symbols?.grand || {}) },
      priority: c.goals.symbols?.priority || 0,
      done: !!c.goals.symbols?.done,
    },
    solErda: { ...emptyGoals().solErda, ...(c.goals.solErda || {}) },
    hexa: Array.isArray(c.goals.hexa) ? [0, 1, 2].map(i => !!c.goals.hexa[i]) : [false, false, false],
    setMemo: c.goals.setMemo || '',
  } : emptyGoals(),
  budget: c.budget || { total: 0 },
  bossTimes: c.bossTimes || {},
  hexaSkills: c.hexaSkills ? {
    slots: { ...emptyHexa().slots, ...(c.hexaSkills.slots || {}) },
    priority: c.hexaSkills.priority || 0,
    done: !!c.hexaSkills.done,
  } : emptyHexa(),
});

/* =========================================================
 * 만료 알림 (브라우저 Notification + 페이지 배너)
 * - D-1, D-day 항목만 노출
 * - 같은 날짜에는 한 번만 알림 (localStorage로 중복 방지)
 * ========================================================= */
function useExpiryNotifications(characters) {
  const [permission, setPermission] = useState(() =>
    typeof Notification !== 'undefined' ? Notification.permission : 'unsupported'
  );
  const [pending, setPending] = useState([]);

  // 페이지 진입 시 알림 권한 자동 요청 (한 번만)
  useEffect(() => {
    if (typeof Notification === 'undefined') return;
    if (Notification.permission === 'default') {
      Notification.requestPermission().then(p => setPermission(p)).catch(() => {});
    }
  }, []);

  // 만료/임박 항목 탐지
  useEffect(() => {
    const items = [];
    for (const c of characters) {
      for (const [k, v] of Object.entries(c.durations || {})) {
        if (!v) continue;
        const d = daysUntil(v);
        if (d === 0 || d === 1 || (d !== null && d < 0)) {
          items.push({
            charName: c.name,
            charId: c.id,
            type: k,
            typeLabel: TYPE_LABEL[k] || k,
            date: v,
            days: d,
          });
        }
      }
    }
    setPending(items);

    // 브라우저 알림 발송 (오늘 한 번만)
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    const today = todayStr();
    const shown = loadLS(LS_KEYS.NOTIF_SHOWN, { date: '', keys: [] });
    if (shown.date !== today) shown.keys = [];
    const nextKeys = [...shown.keys];
    for (const it of items) {
      const key = `${it.charId}|${it.type}|${it.date}|${it.days}`;
      if (nextKeys.includes(key)) continue;
      const title =
        it.days < 0 ? `[만료됨] ${it.charName} - ${it.typeLabel}` :
        it.days === 0 ? `[오늘 만료] ${it.charName} - ${it.typeLabel}` :
        `[내일 만료] ${it.charName} - ${it.typeLabel}`;
      const body = `${it.typeLabel} 만료일: ${it.date}`;
      try {
        new Notification(title, { body, icon: 'icon.png', tag: key });
      } catch {}
      nextKeys.push(key);
    }
    saveLS(LS_KEYS.NOTIF_SHOWN, { date: today, keys: nextKeys });
  }, [characters]);

  const askPermission = () => {
    if (typeof Notification === 'undefined') return;
    Notification.requestPermission().then(p => setPermission(p)).catch(() => {});
  };

  return { pending, permission, askPermission };
}

/* =========================================================
 * 메인 App
 * ========================================================= */
function App() {
  const [characters, setCharacters] = useState(() => loadLS(LS_KEYS.CHARS, []).map(normalizeChar));
  const [bossData, setBossData]     = useState(() => reconcileBossData(loadLS(LS_KEYS.BOSS_DATA, null)));
  const [selected, setSelected]     = useState(() => loadLS(LS_KEYS.SELECTED, 'dashboard'));
  const [sidebarOpen, setSidebarOpen] = useState(false);

  useEffect(() => saveLS(LS_KEYS.CHARS, characters), [characters]);
  useEffect(() => saveLS(LS_KEYS.BOSS_DATA, bossData), [bossData]);
  useEffect(() => saveLS(LS_KEYS.SELECTED, selected), [selected]);

  const { pending, permission, askPermission } = useExpiryNotifications(characters);

  // 캐릭터별 총 수익 계산 (주간 / 월간 분리)
  const charTotals = useMemo(() => {
    const map = {};
    for (const c of characters) {
      let weekly = 0, monthly = 0;
      for (const row of (c.bosses || [])) {
        const boss = bossData.find(b => b.id === row.bossId);
        if (!boss) continue;
        const { price } = getDifficultyEntry(boss, row.difficulty);
        const members = Math.max(1, row.partyMembers || 1);
        const rev = Math.floor(price / members);
        if (boss.monthly) monthly += rev;
        else weekly += rev;
      }
      map[c.id] = { weekly, monthly, total: weekly + monthly };
    }
    return map;
  }, [characters, bossData]);

  const grandTotal = useMemo(
    () => Object.values(charTotals).reduce(
      (a, t) => ({
        weekly: a.weekly + t.weekly,
        monthly: a.monthly + t.monthly,
        total: a.total + t.total,
      }),
      { weekly: 0, monthly: 0, total: 0 }
    ),
    [charTotals]
  );

  const addCharacter = useCallback((name) => {
    const newChar = {
      id: uid(),
      name: name?.trim() || `캐릭터${characters.length + 1}`,
      durations: {
        pet: '',
        label_hat: '', label_clothes: '', label_shoes: '', label_cape: '', label_weapon: '',
        specialCore: '',
      },
      bosses: [],
      equipment: {},
      goals: emptyGoals(),
      budget: { total: 0 },
    };
    setCharacters(prev => [...prev, newChar]);
    setSelected(newChar.id);
    setSidebarOpen(false);
  }, [characters]);

  const removeCharacter = useCallback((id) => {
    if (!confirm('이 캐릭터를 삭제할까요? 되돌릴 수 없습니다.')) return;
    setCharacters(prev => prev.filter(c => c.id !== id));
    setSelected('dashboard');
  }, []);

  const updateCharacter = useCallback((id, updater) => {
    setCharacters(prev => prev.map(c => c.id === id ? updater(c) : c));
  }, []);

  // 예산 복사/붙여넣기 (다른 캐릭터로)
  const [budgetClip, setBudgetClip] = useState(() => loadLS('maple_budget_clip', null));
  const copyBudget = useCallback((id) => {
    setCharacters(prev => {
      const c = prev.find(x => x.id === id);
      if (c) {
        const clip = {
          equipment: JSON.parse(JSON.stringify(c.equipment || {})),
          goals: JSON.parse(JSON.stringify(c.goals || emptyGoals())),
          budget: JSON.parse(JSON.stringify(c.budget || { total: 0 })),
          hexaSkills: JSON.parse(JSON.stringify(c.hexaSkills || emptyHexa())),
          from: c.name,
        };
        setBudgetClip(clip);
        saveLS('maple_budget_clip', clip);
      }
      return prev;
    });
  }, []);
  const pasteBudget = useCallback((id) => {
    if (!budgetClip) return;
    if (!confirm(`'${budgetClip.from}'의 예산을 이 캐릭터에 덮어쓸까요? (현재 예산 내용이 사라집니다)`)) return;
    setCharacters(prev => prev.map(c => c.id === id ? normalizeChar({
      ...c,
      equipment: JSON.parse(JSON.stringify(budgetClip.equipment || {})),
      goals: JSON.parse(JSON.stringify(budgetClip.goals || emptyGoals())),
      budget: JSON.parse(JSON.stringify(budgetClip.budget || { total: 0 })),
      hexaSkills: JSON.parse(JSON.stringify(budgetClip.hexaSkills || emptyHexa())),
    }) : c));
  }, [budgetClip]);

  // 데이터 백업: JSON 파일 내보내기 / 가져오기
  const exportData = useCallback(() => {
    const data = { app: 'maple-check', version: 1, exportedAt: todayStr(), characters, bossData };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `maple-check-backup-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }, [characters, bossData]);

  const importDataFile = useCallback((file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const j = JSON.parse(reader.result);
        if (!j || !Array.isArray(j.characters)) { alert('올바른 메이플체크 백업 파일이 아닙니다.'); return; }
        if (!confirm(`백업 불러오기: ${j.exportedAt || '날짜 미상'} · 캐릭터 ${j.characters.length}명\n현재 이 브라우저의 데이터를 덮어씁니다. 진행할까요?`)) return;
        setCharacters(j.characters.map(normalizeChar));
        if (Array.isArray(j.bossData)) setBossData(reconcileBossData(j.bossData));
        setSelected('dashboard');
        alert('불러오기 완료!');
      } catch {
        alert('파일을 읽을 수 없습니다. (JSON 형식 오류)');
      }
    };
    reader.readAsText(file);
  }, []);

  return (
    <div className="flex h-full w-full overflow-hidden">
      {sidebarOpen && (
        <div
          className="fixed inset-0 bg-black/60 z-30 md:hidden"
          onClick={() => setSidebarOpen(false)}
        />
      )}

      <Sidebar
        characters={characters}
        charTotals={charTotals}
        selected={selected}
        onSelect={(id) => { setSelected(id); setSidebarOpen(false); }}
        onAdd={addCharacter}
        onRemove={removeCharacter}
        open={sidebarOpen}
        onExport={exportData}
        onImportFile={importDataFile}
      />

      <main className="flex-1 overflow-y-auto">
        <header className="sticky top-0 z-20 bg-maple-bg/80 backdrop-blur border-b border-maple-border px-4 py-3 flex items-center gap-3 md:hidden">
          <button
            onClick={() => setSidebarOpen(true)}
            className="p-2 -ml-2 rounded hover:bg-maple-panel"
            aria-label="메뉴"
          >
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M3 6h18M3 12h18M3 18h18" />
            </svg>
          </button>
          <h1 className="text-lg font-bold text-maple-accent flex items-center gap-2">
            <img src="icon.png" alt="" className="w-7 h-7 rounded-lg object-cover" /> 메이플 체크
          </h1>
        </header>

        <div className="p-4 md:p-8">
          {/* 상단 알림 배너: D-1 / D-day / 만료됨 */}
          {pending.length > 0 && (
            <ExpiryBanner
              items={pending}
              permission={permission}
              onAskPermission={askPermission}
              onSelect={(id) => setSelected(id)}
            />
          )}

          {selected === 'dashboard' && (
            <Dashboard
              characters={characters}
              charTotals={charTotals}
              grandTotal={grandTotal}
              bossData={bossData}
              onSelect={setSelected}
            />
          )}
          {selected === 'boss_data' && (
            <BossDataEditor bossData={bossData} setBossData={setBossData} />
          )}
          {selected === 'boss_history' && (
            <BossHistoryView />
          )}
          {selected === 'symbol_price' && (
            <SymbolPriceView />
          )}
          {selected === 'enhance_calc' && (
            <EnhanceCalcView />
          )}
          {selected === 'budget_summary' && (
            <BudgetSummaryView characters={characters} charTotals={charTotals} onSelect={setSelected} />
          )}
          {characters.find(c => c.id === selected) && (
            <CharacterView
              character={characters.find(c => c.id === selected)}
              bossData={bossData}
              totals={charTotals[selected] || { weekly: 0, monthly: 0, total: 0 }}
              onUpdate={(updater) => updateCharacter(selected, updater)}
              onRemove={() => removeCharacter(selected)}
              onCopyBudget={() => copyBudget(selected)}
              onPasteBudget={() => pasteBudget(selected)}
              budgetClip={budgetClip}
            />
          )}
        </div>

        <footer className="px-6 py-8 text-center text-xs text-slate-500">
          메이플 체크 · 데이터는 이 브라우저에만 저장됩니다 · {new Date().getFullYear()}
        </footer>
      </main>
    </div>
  );
}

/* =========================================================

 * ========================================================= */
function ExpiryBanner({ items, permission, onAskPermission, onSelect }) {
  return (
    <div className="mb-6 max-w-5xl mx-auto bg-red-500/10 border border-red-500/40 rounded-xl p-4 md:p-5">
      <div className="flex items-start justify-between gap-3 flex-wrap">
        <h3 className="font-bold text-maple-danger flex items-center gap-2">
          <span>🔔</span> 만료 알림

        {permission !== 'granted' && permission !== 'unsupported' && (
          <button
            onClick={onAskPermission}
            className="text-xs bg-maple-danger/20 hover:bg-maple-danger/30 border border-red-500/40 text-red-200 px-3 py-1 rounded"
          >
            브라우저 알림 허용
          </button>
        )}
      </div>
      <div className="mt-3 space-y-2">
        {items.map((it, i) => {
          const tone =
            it.days < 0 ? 'text-maple-danger' :
            it.days === 0 ? 'text-maple-danger' :
            'text-maple-warn';
          const tag =
            it.days < 0 ? '만료됨' :
            it.days === 0 ? '오늘 만료' :
            '내일 만료';
          return (
            <button
              key={i}
              onClick={() => onSelect(it.charId)}
              className="w-full text-left bg-maple-panel/60 hover:bg-maple-panel rounded px-3 py-2 flex items-center justify-between"
            >
              <div>
                <span className="font-medium">{it.charName}</span>
                <span className="text-slate-500 mx-2">·</span>

              <div className={`text-sm font-bold ${tone}`}>

              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* =========================================================
 * Dashboard (총 통합 정리)
 * ========================================================= */
function Dashboard({ characters, charTotals, grandTotal, bossData, onSelect }) {
  const expiring = useMemo(() => {
    const items = [];
    for (const c of characters) {
      for (const [k, v] of Object.entries(c.durations || {})) {
        if (!v) continue;
        const d = daysUntil(v);
        if (d !== null && d <= 30) {
          items.push({ char: c.name, charId: c.id, type: k, date: v, days: d });
        }
      }
    }
    return items.sort((a, b) => a.days - b.days);
  }, [characters]);

  return (
    <div className="max-w-5xl mx-auto space-y-6">
      <div>
        <h2 className="text-2xl md:text-3xl font-bold">📊 총 통합 정리</h2>
        <p className="text-slate-400 mt-1">모든 캐릭터의 주간 보스 결정석 수익 합계</p>
      </div>

      <div className="bg-gradient-to-br from-amber-500/20 to-orange-500/10 border border-maple-accent/30 rounded-xl p-6 md:p-8">
        <div className="text-sm text-slate-300">총 보스 결정석 수익</div>
        <div className="text-3xl md:text-5xl font-bold text-maple-accent mt-2 break-all">
          {fmtMeso(grandTotal.total)}
        </div>
        <div className="grid grid-cols-2 gap-3 mt-4">
          <div className="bg-maple-bg/40 rounded-lg px-4 py-3">
            <div className="text-xs text-slate-400">주간 수익</div>
            <div className="text-base md:text-xl font-bold text-sky-300 mt-0.5 break-all">{fmtMeso(grandTotal.weekly)}</div>
          </div>
          <div className="bg-maple-bg/40 rounded-lg px-4 py-3">
            <div className="text-xs text-slate-400">월간 수익</div>
            <div className="text-base md:text-xl font-bold text-violet-300 mt-0.5 break-all">{fmtMeso(grandTotal.monthly)}</div>
          </div>

        <div className="text-sm text-slate-400 mt-3">

      {expiring.length > 0 && (
        <div className="bg-maple-panel border border-maple-border rounded-xl p-5">
          <h3 className="font-semibold mb-3 flex items-center gap-2">
            <span>⏰</span> 만료 임박 (30일 이내)
          </h3>
          <div className="space-y-2">
            {expiring.map((e, i) => (
              <button
                key={i}
                onClick={() => onSelect(e.charId)}
                className="w-full flex items-center justify-between text-left bg-maple-bg/50 hover:bg-maple-bg rounded px-3 py-2"
              >
                <div>
                  <span className="text-slate-300">{e.char}</span>
                  <span className="text-slate-500 mx-2">·</span>
                  <span className="text-slate-400">{TYPE_LABEL[e.type] || e.type}</span>

                  </div>
                  <div className="text-xs text-slate-500">{e.date}</div>

            왼쪽 사이드바에서 캐릭터를 추가해 주세요.

          <div className="divide-y divide-maple-border">
            {characters.map(c => (
              <button
                key={c.id}
                onClick={() => onSelect(c.id)}

                    <div className="font-medium">{c.name}</div>
                    <div className="text-xs text-slate-500">보스 {c.bosses?.length || 0}개 선택됨</div>
                  </div>

                      {fmtMeso(charTotals[c.id]?.total || 0)}

/* =========================================================
 * CharacterView (개별 캐릭터)
 * ========================================================= */
function CharacterView({ character, bossData, totals, onUpdate, onRemove, onCopyBudget, onPasteBudget, budgetClip }) {
  const [editName, setEditName] = useState(false);
  const [nameInput, setNameInput] = useState(character.name);
  const [tab, setTab] = useState('boss');

  useEffect(() => { setNameInput(character.name); setTab('boss'); }, [character.id]);

  const setDuration = (key, value) => {
    onUpdate(c => ({ ...c, durations: { ...c.durations, [key]: value } }));
  };

  const setEquipSlot = (slotId, patch) => {
    onUpdate(c => ({
      ...c,
      equipment: {
        ...c.equipment,
        [slotId]: { ...emptyEquipSlot(), ...(c.equipment?.[slotId] || {}), ...patch },
      },
    }));
  };
  const clearEquipSlot = (slotId) => {
    onUpdate(c => {
      const next = { ...c.equipment };
      delete next[slotId];
      return { ...c, equipment: next };
    });
  };
  const setGoals = (updater) => {
    onUpdate(c => ({ ...c, goals: updater(c.goals || emptyGoals()) }));
  };
  const setBudgetTotal = (n) => {
    onUpdate(c => ({ ...c, budget: { ...(c.budget || {}), total: n } }));
  };
  const setHexa = (updater) => {
    onUpdate(c => ({ ...c, hexaSkills: updater(c.hexaSkills || emptyHexa()) }));
  };

  const WEEKLY_LIMIT = 12;

  const toggleBoss = (bossId, difficulty) => {
    onUpdate(c => {
      // 현재 보스 목록에 없는(일간 전환 등으로 제거된) 보스 선택은 정리
      let list = (c.bosses || []).filter(b => bossData.find(x => x.id === b.bossId));
      const boss = bossData.find(b => b.id === bossId);
      const idx = list.findIndex(b => b.bossId === bossId && b.difficulty === difficulty);
      if (idx >= 0) {
        // 선택 해제
        return { ...c, bosses: list.filter((_, i) => i !== idx) };
      }
      // 같은 보스는 한 난이도만 선택 가능 → 같은 보스의 다른 난이도는 자동 해제
      list = list.filter(b => b.bossId !== bossId);
      // 주간 12개 한도: 월간 보스/제거된(목록에 없는) 보스는 카운트에서 제외
      if (!boss?.monthly) {
        const weeklyCount = list.filter(b => {
          const bd = bossData.find(x => x.id === b.bossId);
          return bd && !bd.monthly;
        }).length;
        if (weeklyCount >= WEEKLY_LIMIT) return c; // 안전장치
      }
      return {
        ...c,
        bosses: [...list, {
          rowId: 'r_' + Math.random().toString(36).slice(2, 8),
          bossId, difficulty, partyMembers: 1
        }]
      };
    });
  };

  const setBossMembers = (bossId, difficulty, n) => {
    onUpdate(c => ({
      ...c,
      bosses: (c.bosses || []).map(b =>
        (b.bossId === bossId && b.difficulty === difficulty)
          ? { ...b, partyMembers: n }
          : b
      )
    }));
  };

  const resetBosses = () => {
    if (!confirm('이 캐릭터의 보스 선택(주간·월간)을 모두 초기화할까요?')) return;
    onUpdate(c => ({ ...c, bosses: [] }));
  };

  // 보스 소요시간(분) — 캐릭터별로 저장
  const setBossTime = (bossId, minutes) => {
    onUpdate(c => ({ ...c, bossTimes: { ...(c.bossTimes || {}), [bossId]: minutes } }));
  };

  // 선택 보스 기준 소요시간 합산 (상단 카드 표시용)
  const bossTimeSum = useMemo(() => {
    let w = 0, mb = 0;
    const times = character.bossTimes || {};
    for (const r of (character.bosses || [])) {
      const boss = bossData.find(b => b.id === r.bossId);
      if (!boss) continue;
      const t = Math.max(0, times[r.bossId] || 0);
      if (boss.monthly) mb += t; else w += t;
    }
    return { weekly: w, monthly: w * 4 + mb };
  }, [character.bosses, character.bossTimes, bossData]);

  const saveName = () => {
    const v = nameInput.trim();
    if (v) onUpdate(c => ({ ...c, name: v }));
    setEditName(false);
  };

  return (
    <div className="max-w-5xl mx-auto space-y-6">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div>
          {editName ? (
            <div className="flex gap-2">
              <input
                value={nameInput}
                onChange={(e) => setNameInput(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && saveName()}
                autoFocus
                className="bg-maple-panel border border-maple-border rounded px-3 py-1.5 text-xl font-bold focus:outline-none focus:border-maple-accent"
              />
              <button onClick={saveName} className="bg-maple-accent text-slate-900 px-3 rounded font-medium">저장</button>
            </div>
          ) : (
            <h2
              className="text-2xl md:text-3xl font-bold flex items-center gap-2 cursor-pointer hover:text-maple-accent"
              onClick={() => setEditName(true)}
              title="클릭해서 이름 수정"
            >
              👤 {character.name}
              <span className="text-xs text-slate-500 font-normal">(클릭해서 수정)</span>
            </h2>
          )}
          <p className="text-slate-400 mt-1">보스 수익 & 기간제 아이템 관리</p>
        </div>
        <button
          onClick={onRemove}
          className="text-sm text-maple-danger hover:bg-red-500/10 px-3 py-1.5 rounded border border-red-500/30"
        >
          캐릭터 삭제
        </button>
      </div>

      {/* 탭 전환: 보스 수익 / 예산 플래너 / 기간제 */}
      <div className="flex items-center gap-1 bg-maple-panel border border-maple-border rounded-lg p-1 w-fit flex-wrap">
        <TabBtn active={tab === 'boss'} onClick={() => setTab('boss')}>💎 보스 수익</TabBtn>
        <TabBtn active={tab === 'budget'} onClick={() => setTab('budget')}>🧮 예산 플래너</TabBtn>
        <TabBtn active={tab === 'duration'} onClick={() => setTab('duration')}>📅 기간제</TabBtn>
      </div>

      {tab === 'boss' && (
        <>
          <div className="bg-gradient-to-br from-amber-500/15 to-orange-500/5 border border-maple-accent/30 rounded-xl p-5">
            <div className="text-sm text-slate-300">이 캐릭터의 총 보스 수익</div>
            <div className="text-2xl md:text-4xl font-bold text-maple-accent mt-1 break-all">
              {fmtMeso(totals.total)}
            </div>
            <div className="grid grid-cols-2 gap-3 mt-4">
              <div className="bg-maple-bg/40 rounded-lg px-4 py-3">
                <div className="text-xs text-slate-400">주간 수익</div>
                <div className="text-base md:text-lg font-bold text-sky-300 mt-0.5 break-all">{fmtMeso(totals.weekly)}</div>
                <div className="text-xs text-slate-400 mt-1">주간 소요시간 <span className="text-sky-200/80 font-medium">{fmtMinutes(bossTimeSum.weekly)}</span></div>
              </div>
              <div className="bg-maple-bg/40 rounded-lg px-4 py-3">
                <div className="text-xs text-slate-400">월간 수익</div>
                <div className="text-base md:text-lg font-bold text-violet-300 mt-0.5 break-all">{fmtMeso(totals.monthly)}</div>
                <div className="text-xs text-slate-400 mt-1">월간 소요시간 <span className="text-violet-200/80 font-medium">{fmtMinutes(bossTimeSum.monthly)}</span></div>
              </div>
            </div>
          </div>

          <BossRevenueTable
            rows={character.bosses || []}
            bossData={bossData}
            bossTimes={character.bossTimes || {}}
            weeklyLimit={WEEKLY_LIMIT}
            onToggle={toggleBoss}
            onSetMembers={setBossMembers}
            onReset={resetBosses}
            onSetTime={setBossTime}
          />
        </>
      )}

      {tab === 'duration' && (
        <DurationsPanel durations={character.durations || {}} setDuration={setDuration} />
      )}

      {tab === 'budget' && (
        <>
          <div className="flex items-center justify-end gap-2">
            <button onClick={onCopyBudget}
              className="text-xs bg-maple-bg border border-maple-border hover:border-maple-accent/60 px-3 py-1.5 rounded text-slate-200">📋 예산 복사</button>
            <button onClick={onPasteBudget} disabled={!budgetClip}
              className="text-xs bg-maple-bg border border-maple-border hover:border-maple-accent/60 px-3 py-1.5 rounded text-slate-200 disabled:opacity-40 disabled:cursor-not-allowed">
              📥 붙여넣기{budgetClip ? ` (${budgetClip.from})` : ''}
            </button>
          </div>
          <BudgetPlanner
            character={character}
            totals={totals}
            setEquipSlot={setEquipSlot}
            clearEquipSlot={clearEquipSlot}
            setGoals={setGoals}
            setBudgetTotal={setBudgetTotal}
            setHexa={setHexa}
          />
        </>
      )}
    </div>
  );
}

function TabBtn({ active, onClick, children }) {
  return (
    <button
      onClick={onClick}
      className={`text-sm px-3 py-1.5 rounded-md transition whitespace-nowrap ${
        active ? 'bg-maple-accent text-slate-900 font-semibold' : 'text-slate-300 hover:bg-maple-bg'
      }`}
    >
      {children}
    </button>
  );
}

/* =========================================================
 * 기간제 패널
 * ========================================================= */
function DurationField({ label, value, onChange }) {
  const d = daysUntil(value);
  const tone = d === null ? 'text-slate-500'
    : d < 0 ? 'text-maple-danger'
    : d <= 1 ? 'text-maple-danger'
    : d <= 7 ? 'text-maple-warn'
    : 'text-maple-good';
  return (
    <div>
      <label className="text-sm text-slate-300 block mb-1.5">{label}</label>
      <input
        type="date"
        value={value}
        onChange={(e) => onChange(e.target.value)}
        className="w-full bg-maple-bg border border-maple-border rounded px-3 py-2 text-sm focus:outline-none focus:border-maple-accent"
      />
      <div className={`text-xs mt-1 ${tone}`}>
        {d === null ? '미입력'
          : d < 0 ? `만료됨 (${-d}일 지남)`
          : d === 0 ? '🔔 오늘 만료'
          : d === 1 ? '🔔 내일 만료'
          : `${d}일 남음`}
      </div>
    </div>
  );
}

    { key: 'label_cape',    label: '망토' },
    { key: 'label_weapon',  label: '무기' },

  return (
    <div className="bg-maple-panel border border-maple-border rounded-xl p-5">
      <h3 className="font-semibold mb-4 flex items-center gap-2">
        <span>📅</span> 기간제 아이템 만료일

/* =========================================================
 * 보스 수익 테이블
 * ========================================================= */
const DIFF_ORDER = { 'Easy': 0, 'Normal': 1, 'Hard': 2, 'Chaos': 3, 'Extreme': 4 };

// 난이도별 색상: off=미선택(연한), on=선택(진한)
const DIFF_STYLE = {
  'Easy':    { off: 'bg-emerald-500/15 text-emerald-300 border-emerald-500/40', on: 'bg-emerald-500 text-slate-900 border-emerald-300' },
  'Normal':  { off: 'bg-sky-500/15 text-sky-300 border-sky-500/40',             on: 'bg-sky-500 text-slate-900 border-sky-300' },
  'Hard':    { off: 'bg-pink-500/15 text-pink-300 border-pink-500/40',           on: 'bg-pink-500 text-slate-900 border-pink-300' },
  'Chaos':   { off: 'bg-orange-500/15 text-orange-300 border-orange-500/40',     on: 'bg-orange-500 text-slate-900 border-orange-300' },
  'Extreme': { off: 'bg-red-500/15 text-red-300 border-red-500/40',             on: 'bg-red-500 text-white border-red-300' },
};
const diffStyle = (diff) => DIFF_STYLE[diff] || { off: 'bg-slate-500/15 text-slate-300 border-slate-500/40', on: 'bg-slate-400 text-slate-900 border-slate-200' };
const DIFF_LETTER = { 'Easy': 'E', 'Normal': 'N', 'Hard': 'H', 'Chaos': 'C', 'Extreme': 'X' };

// 캐릭터별 보스 미니 표기 (아이콘 + 난이도 글자 + 파티원)
function BossMiniStrip({ bosses, bossData }) {
  const order = bossData.map(b => b.id);
  const rows = (bosses || [])
    .map(r => ({ r, boss: bossData.find(b => b.id === r.bossId) }))
    .filter(x => x.boss)
    .sort((a, b) => order.indexOf(a.r.bossId) - order.indexOf(b.r.bossId));
  if (!rows.length) return null;
  return (
    <div className="flex flex-wrap gap-1.5 mt-2">
      {rows.map(({ r, boss }) => {
        const st = diffStyle(r.difficulty);
        return (
          <div key={boss.id + '_' + r.difficulty} className="relative flex-shrink-0" title={`${boss.name} · ${r.difficulty}${r.partyMembers > 1 ? ` · ${r.partyMembers}인` : ''}`}>
            <BossIcon id={boss.id} name={boss.name} icon={boss.icon} />
            <span className={`absolute -bottom-1 left-1/2 -translate-x-1/2 text-[8px] font-extrabold leading-none px-1 py-px rounded border ${st.on}`}>{DIFF_LETTER[r.difficulty] || '?'}</span>
            {r.partyMembers > 1 && (
              <span className="absolute -top-1 -right-1 w-3.5 h-3.5 flex items-center justify-center text-[8px] font-bold text-white bg-slate-900/90 border border-slate-500 rounded-full">{r.partyMembers}</span>
            )}
          </div>
        );
      })}
    </div>
  );
}

function DifficultyBadge({ difficulty }) {
  const style = diffStyle(difficulty).off;
  return (
    <span className={`text-[10px] font-bold tracking-wider uppercase px-2 py-0.5 rounded border ${style}`}>
      {difficulty}
    </span>
  );
}

function SortBtn({ active, onClick, children }) {
  return (
    <button
      onClick={onClick}
      className={`text-xs px-2.5 py-1 rounded transition ${
        active ? 'bg-maple-accent text-slate-900 font-semibold' : 'text-slate-300 hover:text-white'
      }`}
    >
      {children}
    </button>
  );
}

/* 보스 아이콘: icons/{id}.png 가 있으면 표시, 없으면 컬러 배지로 폴백 */
const ICON_GRADIENTS = [
  'from-rose-500 to-rose-800',
  'from-amber-500 to-amber-800',
  'from-emerald-500 to-emerald-800',
  'from-sky-500 to-sky-800',
  'from-violet-500 to-violet-800',
  'from-pink-500 to-pink-800',
  'from-cyan-500 to-cyan-800',
  'from-orange-500 to-orange-800',
];

function BossIcon({ id, name, icon }) {
  const [failed, setFailed] = useState(false);
  if (icon && !failed) {
    return (
      <img
        src={icon}
        alt=""
        onError={() => setFailed(true)}
        className="w-8 h-8 rounded object-cover bg-maple-bg flex-shrink-0"
      />
    );
  }
  const hash = [...(id || name || '')].reduce((a, c) => a + c.charCodeAt(0), 0);
  const grad = ICON_GRADIENTS[hash % ICON_GRADIENTS.length];
  return (
    <div className={`w-8 h-8 rounded bg-gradient-to-br ${grad} flex items-center justify-center text-sm font-bold text-white flex-shrink-0`}>
      {(name || '?').slice(0, 1)}
    </div>
  );
}

function BossRevenueTable({ rows, bossData, bossTimes = {}, weeklyLimit, onToggle, onSetMembers, onReset, onSetTime }) {
  const [sortMode, setSortMode] = useState('natural');

  // 보스당 선택된 난이도 (보스당 1개) — 현재 보스 목록에 있는 것만 (제거된 보스 무시)
  const selByBoss = useMemo(() => {
    const valid = new Set(bossData.map(b => b.id));
    const m = {};
    for (const r of rows) if (valid.has(r.bossId)) m[r.bossId] = r;
    return m;
  }, [rows, bossData]);

  const monthlyIds = useMemo(() => {
    const s = new Set();
    for (const b of bossData) if (b.monthly) s.add(b.id);
    return s;
  }, [bossData]);

  // 보스별 묶음 (난이도 배지 정렬)
  const bossList = useMemo(() => {
    const list = bossData.map(boss => {
      const diffs = Object.keys(boss.difficulties).map(diff => {
        const { price, max } = getDifficultyEntry(boss, diff);
        return { diff, price, max };
      });
      diffs.sort((a, b) => (DIFF_ORDER[a.diff] ?? 99) - (DIFF_ORDER[b.diff] ?? 99));
      const maxPrice = diffs.reduce((a, d) => Math.max(a, d.price), 0);
      return { boss, diffs, maxPrice, monthly: !!boss.monthly };
    });
    return list;
  }, [bossData]);

  // 가격순: 보스×난이도를 펼쳐서 가격순으로만 정렬
  const flatEntries = useMemo(() => {
    const arr = [];
    for (const boss of bossData) {
      for (const diff of Object.keys(boss.difficulties)) {
        const { price, max } = getDifficultyEntry(boss, diff);
        arr.push({ boss, diff, price, max, monthly: !!boss.monthly });
      }
    }
    arr.sort((a, b) => sortMode === 'price_asc' ? a.price - b.price : b.price - a.price);
    return arr;
  }, [bossData, sortMode]);

  const selectedRows = Object.values(selByBoss);
  const weeklyCount = selectedRows.filter(r => !monthlyIds.has(r.bossId)).length;
  const monthlyCount = selectedRows.filter(r => monthlyIds.has(r.bossId)).length;
  const isFull = weeklyCount >= weeklyLimit;

  const revenue = useMemo(() => {
    let weekly = 0, monthly = 0;
    for (const r of rows) {
      const boss = bossData.find(b => b.id === r.bossId);
      if (!boss) continue;
      const { price, max } = getDifficultyEntry(boss, r.difficulty);
      const members = Math.min(Math.max(1, r.partyMembers || 1), max);
      const rev = Math.floor(price / members);
      if (boss.monthly) monthly += rev;
      else weekly += rev;
    }
    return { weekly, monthly, total: weekly + monthly };
  }, [rows, bossData]);

  // 소요시간 합산: 선택된 보스 기준
  // 주간 소요 = 주간보스 시간 합 / 월간 소요 = 주간 소요 ×4 + 월간보스 시간 합
  const timeSum = useMemo(() => {
    let weeklyT = 0, monthlyBossT = 0;
    for (const r of selectedRows) {
      const boss = bossData.find(b => b.id === r.bossId);
      if (!boss) continue;
      const t = Math.max(0, bossTimes[boss.id] || 0);
      if (boss.monthly) monthlyBossT += t; else weeklyT += t;
    }
    return { weekly: weeklyT, monthly: weeklyT * 4 + monthlyBossT };
  }, [selectedRows, bossData, bossTimes]);

  return (
    <div className="relative bg-maple-panel border border-maple-border rounded-xl p-4 md:p-5">
      <button
        type="button" onClick={onReset}
        className="absolute top-3 right-3 md:top-4 md:right-4 text-xs font-semibold text-maple-danger border border-red-500/40 hover:bg-red-500/10 px-3 py-1.5 rounded-md z-10"
        title="선택한 보스(주간·월간)를 모두 해제"
      >
        🔄 초기화
      </button>
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3 pr-20">
        <div>
          <h3 className="font-semibold flex items-center gap-2">
            <span>💎</span> 보스 결정석 수익
          </h3>
          <div className="text-xs text-slate-400 mt-1">
            보스마다 <span className="text-slate-300">난이도 배지를 클릭</span>해 선택하세요. 다시 누르면 해제됩니다. 한 보스는 한 난이도만, 주간 최대 12개. 월간 보스(검은 마법사)는 한도 제외.
          </div>
        </div>
        <div className="flex items-center gap-3 flex-wrap">
          <div className={`text-sm font-medium px-2.5 py-1 rounded-md border ${isFull ? 'bg-emerald-500/15 border-emerald-500/50' : 'bg-maple-bg border-maple-border'}`}>
            주간 <span className={isFull ? 'text-emerald-300 font-bold' : 'text-maple-accent font-bold'}>{weeklyCount}</span>
            <span className="text-slate-500"> / {weeklyLimit}</span>
            {isFull && <span className="text-emerald-300 font-bold ml-1">✓ 가득참</span>}
            {/* 월간 카운터는 항상 표시 → 선택해도 레이아웃이 밀리지 않음 */}
            <span className="text-slate-500 ml-2">· 월간 <span className="text-violet-300 font-bold">{monthlyCount}</span></span>
          </div>
          <div className="flex items-center gap-0.5 bg-maple-bg border border-maple-border rounded p-0.5">
            <SortBtn active={sortMode === 'natural'} onClick={() => setSortMode('natural')}>기본</SortBtn>
            <SortBtn active={sortMode === 'price_desc'} onClick={() => setSortMode('price_desc')}>가격 ↓</SortBtn>
            <SortBtn active={sortMode === 'price_asc'} onClick={() => setSortMode('price_asc')}>가격 ↑</SortBtn>
          </div>
        </div>
      </div>

      {isFull && (
        <div className="mb-3 bg-amber-500/10 border border-amber-500/40 text-amber-200 text-xs rounded px-3 py-2">
          ⚠️ 주간 한도 12개를 모두 선택했습니다. 다른 보스를 추가하려면 기존 선택을 해제하세요.
        </div>
      )}

      <div className="divide-y divide-maple-border">
        {sortMode !== 'natural' ? flatEntries.map(({ boss, diff, price, max, monthly }) => {
          const sel = selByBoss[boss.id];
          const active = !!sel && sel.difficulty === diff;
          const members = active ? Math.min(Math.max(1, sel.partyMembers || 1), max) : 1;
          const revenueVal = active ? Math.floor(price / members) : 0;
          const bossSelected = !!sel;
          const cannotAdd = !active && !bossSelected && isFull && !monthly;
          const st = diffStyle(diff);
          return (
            <div key={boss.id + '_' + diff} className={`flex items-center gap-2 px-1 md:px-2 py-2.5 transition ${active ? 'bg-maple-accent/5' : 'hover:bg-maple-bg/30'}`}>
              <BossIcon id={boss.id} name={boss.name} icon={boss.icon} />
              <span className={`font-medium ${active ? 'text-slate-100' : 'text-slate-300'}`}>{boss.name}</span>
              <button type="button" disabled={cannotAdd} onClick={() => onToggle(boss.id, diff)}
                title={`${diff} · ${fmtMeso(price)}`}
                className={`flex items-center gap-1.5 rounded-md border px-2.5 py-1 text-xs transition ${
                  active ? `${st.on} font-bold ring-2 ring-white/40 shadow`
                    : cannotAdd ? `${st.off} opacity-30 cursor-not-allowed`
                    : `${st.off} hover:brightness-125`}`}>
                <span className="font-bold tracking-wider uppercase">{diff}</span>
                <span className="opacity-90">{fmtMeso(price)}</span>
              </button>
              {monthly && (
                <span className="text-[10px] font-bold tracking-wider px-2 py-0.5 rounded border bg-violet-500/15 text-violet-300 border-violet-500/40">월간</span>
              )}
              {active && (
                <select value={members} onChange={(e) => onSetMembers(boss.id, diff, parseInt(e.target.value) || 1)}
                  className="bg-maple-bg border border-maple-border rounded px-2 py-1 text-xs w-16 text-center"
                  title={max === 1 ? '솔로 전용 (1인)' : `최대 ${max}인`}>
                  {Array.from({ length: max }, (_, i) => i + 1).map(n => <option key={n} value={n}>{n}인</option>)}
                </select>
              )}
              <span className={`ml-auto text-sm md:text-base ${active ? 'font-bold text-maple-accent' : 'text-slate-500'}`}>{fmtMeso(active ? revenueVal : price)}</span>
            </div>
          );
        }) : bossList.map(({ boss, diffs, monthly }) => {
          const sel = selByBoss[boss.id];
          const checked = !!sel;
          const selEntry = checked ? getDifficultyEntry(boss, sel.difficulty) : null;
          const max = selEntry ? selEntry.max : 6;
          const members = checked ? Math.min(Math.max(1, sel.partyMembers || 1), max) : 1;
          const revenueVal = checked ? Math.floor(selEntry.price / members) : 0;
          const cannotAdd = !checked && isFull && !monthly; // 한도 초과 시 새 보스 추가 불가

          return (
            <div key={boss.id} className={`px-1 md:px-2 py-3 transition ${checked ? 'bg-maple-accent/5' : 'hover:bg-maple-bg/30'}`}>
              <div className="flex items-center gap-2 mb-2">
                <BossIcon id={boss.id} name={boss.name} icon={boss.icon} />
                <span className={`font-medium ${checked ? 'text-slate-100' : 'text-slate-300'}`}>{boss.name}</span>
                <span className="flex items-center gap-1 text-[11px] text-slate-400" title="이 캐릭터의 보스 1회 소요시간(분)">
                  <span>소요</span>
                  <input type="text" inputMode="numeric" value={bossTimes[boss.id] || ''} placeholder="-"
                    onChange={(e) => onSetTime(boss.id, parseInt(String(e.target.value).replace(/[^0-9]/g, '')) || 0)}
                    className="w-12 bg-maple-bg border border-maple-border rounded px-1.5 py-0.5 text-xs text-center focus:outline-none focus:border-maple-accent" />
                  <span>분</span>
                </span>
                {monthly && (
                  <span className="text-[10px] font-bold tracking-wider px-2 py-0.5 rounded border bg-violet-500/15 text-violet-300 border-violet-500/40">월간</span>
                )}
                {checked && (
                  <span className="ml-auto font-bold text-maple-accent text-sm md:text-base">{fmtMeso(revenueVal)}</span>
                )}
              </div>
              <div className="flex flex-wrap items-center gap-1.5 pl-1">
                {diffs.map(d => {
                  const active = checked && sel.difficulty === d.diff;
                  const disableThis = cannotAdd && !active;
                  const st = diffStyle(d.diff);
                  return (
                    <button
                      key={d.diff}
                      type="button"
                      disabled={disableThis}
                      onClick={() => onToggle(boss.id, d.diff)}
                      title={`${d.diff} · ${fmtMeso(d.price)}`}
                      className={`flex items-center gap-1.5 rounded-md border px-2.5 py-1 text-xs transition ${
                        active
                          ? `${st.on} font-bold ring-2 ring-white/40 shadow`
                          : disableThis
                            ? `${st.off} opacity-30 cursor-not-allowed`
                            : `${st.off} hover:brightness-125`
                      }`}
                    >
                      <span className="font-bold tracking-wider uppercase">{d.diff}</span>
                      <span className={active ? 'opacity-90' : 'opacity-80'}>{fmtMeso(d.price)}</span>
                    </button>
                  );
                })}
                {checked && (
                  <select
                    value={members}
                    onChange={(e) => onSetMembers(boss.id, sel.difficulty, parseInt(e.target.value) || 1)}
                    className="ml-1 bg-maple-bg border border-maple-border rounded px-2 py-1 text-xs w-16 text-center"
                    title={max === 1 ? '솔로 전용 (1인)' : `최대 ${max}인`}
                  >
                    {Array.from({ length: max }, (_, i) => i + 1).map(n => (
                      <option key={n} value={n}>{n}인</option>
                    ))}
                  </select>
                )}
              </div>
            </div>
          );
        })}
      </div>

      <div className="border-t-2 border-maple-border mt-3 pt-3 space-y-1.5">
        <div className="flex items-center justify-between text-sm">
          <div className="text-slate-300">주간 수익</div>
          <div className="font-semibold text-sky-300">{fmtMeso(revenue.weekly)}</div>
        </div>
        <div className="flex items-center justify-between text-xs">
          <div className="text-slate-400">주간 소요시간</div>
          <div className="font-medium text-sky-200/80">{fmtMinutes(timeSum.weekly)}</div>
        </div>
        <div className="flex items-center justify-between text-sm pt-1">
          <div className="text-slate-300">월간 수익</div>
          <div className="font-semibold text-violet-300">{fmtMeso(revenue.monthly)}</div>
        </div>
        <div className="flex items-center justify-between text-xs">
          <div className="text-slate-400">월간 소요시간 <span className="text-slate-500">(주간×4 + 월간보스)</span></div>
          <div className="font-medium text-violet-200/80">{fmtMinutes(timeSum.monthly)}</div>
        </div>
        <div className="flex items-center justify-between pt-1.5 border-t border-maple-border">
          <div className="font-semibold">총 수익 합계</div>
          <div className="font-bold text-maple-accent text-base md:text-lg">{fmtMeso(revenue.total)}</div>
        </div>
      </div>
    </div>
  );
}

/* =========================================================
 * 보스 결정석 가격 편집기
 * ========================================================= */
function BossDataEditor({ bossData, setBossData }) {
  const updateField = (bossId, diff, field, raw) => {
    const num = parseInt(String(raw).replace(/[^0-9]/g, '')) || 0;
    setBossData(prev => prev.map(b => {
      if (b.id !== bossId) return b;
      const cur = getDifficultyEntry(b, diff);
      const next = { ...cur, [field]: num };
      if (field === 'max') next.max = Math.min(Math.max(1, next.max), 6);
      return {
        ...b,
        difficulties: { ...b.difficulties, [diff]: next }
      };
    }));
  };

  const resetAll = () => {
    if (!confirm('모든 보스/가격/입장 인원을 기본값으로 되돌릴까요?')) return;
    setBossData(JSON.parse(JSON.stringify(DEFAULT_BOSSES)));
  };

  return (
    <div className="max-w-5xl mx-auto space-y-6">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div>
          <h2 className="text-2xl md:text-3xl font-bold">💎 결정석 가격 관리</h2>
          <p className="text-slate-400 mt-1">보스/난이도별 결정석 가격과 입장 인원을 수정하면 모든 캐릭터에 자동 반영됩니다.</p>
        </div>
        <button
          onClick={resetAll}
          className="text-sm text-maple-danger border border-red-500/30 hover:bg-red-500/10 px-3 py-1.5 rounded"
        >
          기본값으로 초기화
        </button>
      </div>

      <div className="bg-maple-panel border border-maple-border rounded-xl divide-y divide-maple-border">
        {bossData.map(boss => (
          <div key={boss.id} className="p-4 md:p-5">
            <div className="font-semibold mb-3 flex items-center gap-2">
              <BossIcon id={boss.id} name={boss.name} icon={boss.icon} />
              <span>{boss.name}</span>
              {boss.level && <span className="text-xs text-slate-500 font-normal">Lv.{boss.level}</span>}
            </div>
            <div className="space-y-3">
              {Object.entries(boss.difficulties).map(([diff, val]) => {
                const entry = typeof val === 'number' ? { price: val, max: 6 } : { price: val.price || 0, max: val.max || 6 };
                return (
                  <div key={diff} className="grid grid-cols-12 gap-2 items-center">
                    <div className="col-span-3 md:col-span-2 text-sm text-slate-300">{diff}</div>
                    <div className="col-span-6 md:col-span-7">
                      <label className="text-[10px] text-slate-500 block mb-0.5">결정석 가격 (메소)</label>
                      <input
                        type="text"
                        inputMode="numeric"
                        value={entry.price.toLocaleString()}
                        onChange={(e) => updateField(boss.id, diff, 'price', e.target.value)}
                        className="w-full bg-maple-bg border border-maple-border rounded px-2 py-1.5 text-sm text-right focus:outline-none focus:border-maple-accent"
                      />
                    </div>
                    <div className="col-span-3 md:col-span-3">
                      <label className="text-[10px] text-slate-500 block mb-0.5">최대 입장</label>
                      <select
                        value={entry.max}
                        onChange={(e) => updateField(boss.id, diff, 'max', e.target.value)}
                        className="w-full bg-maple-bg border border-maple-border rounded px-2 py-1.5 text-sm focus:outline-none focus:border-maple-accent"
                      >
                        {[1,2,3,4,5,6].map(n => <option key={n} value={n}>{n}인</option>)}
                      </select>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* =========================================================
 * 결정석의 역사 (가격 변동 이력)
 * ========================================================= */
function BossHistoryView() {
  // 시간순(오래된→최신). 화면에는 최신을 위로 표시
  const ordered = PRICE_HISTORY;
  const [selectedId, setSelectedId] = useState(
    ordered.length ? ordered[ordered.length - 1].id : null
  );

  const selIdx = ordered.findIndex(e => e.id === selectedId);
  const entry = ordered[selIdx] || null;
  const prevEntry = selIdx > 0 ? ordered[selIdx - 1] : null; // 직전(더 오래된) 기간

  const curMap = entry ? snapshotPriceMap(entry) : {};
  const prevMap = prevEntry ? snapshotPriceMap(prevEntry) : null;

  return (
    <div className="max-w-5xl mx-auto space-y-6">
      <div>
        <h2 className="text-2xl md:text-3xl font-bold">📜 결정석의 역사</h2>
        <p className="text-slate-400 mt-1">
          결정석 가격이 변동될 때마다 기록됩니다. 기간을 클릭하면 그때의 가격을 볼 수 있어요.
        </p>
      </div>

      {/* 기간 선택 (최신이 위로) */}
      <div className="space-y-2">
        {[...ordered].reverse().map(e => {
          const active = e.id === selectedId;
          const isCurrent = e.id === ordered[ordered.length - 1].id;
          return (
            <button
              key={e.id}
              onClick={() => setSelectedId(e.id)}
              className={`w-full text-left rounded-xl border px-4 py-3 transition ${
                active
                  ? 'bg-maple-accent/15 border-maple-accent/50'
                  : 'bg-maple-panel border-maple-border hover:bg-maple-bg/50'
              }`}
            >
              <div className="flex items-center justify-between gap-3 flex-wrap">
                <div className="flex items-center gap-2">
                  <span className={`font-semibold ${active ? 'text-maple-accent' : 'text-slate-100'}`}>
                    {e.title}
                  </span>
                  {isCurrent && (
                    <span className="text-[10px] font-bold tracking-wider px-2 py-0.5 rounded border bg-emerald-500/15 text-emerald-300 border-emerald-500/40">
                      현재
                    </span>
                  )}
                </div>
                <span className="text-xs text-slate-400">{e.range}</span>
              </div>
            </button>
          );
        })}
      </div>

      {entry && (
        <div className="bg-maple-panel border border-maple-border rounded-xl p-4 md:p-5">
          <div className="mb-3">
            <div className="font-semibold flex items-center gap-2">
              <span>💎</span> {entry.title} <span className="text-xs text-slate-500 font-normal">({entry.range})</span>
            </div>
            {entry.note && <div className="text-xs text-slate-400 mt-1">{entry.note}</div>}
            {prevEntry && (
              <div className="text-xs text-slate-500 mt-1">
                ※ 노란색으로 표시된 항목은 직전 기간(<span className="text-slate-400">{prevEntry.title}</span>) 대비 변동된 가격입니다.
              </div>
            )}
          </div>

          <div className="hidden md:grid grid-cols-12 gap-2 text-xs text-slate-400 px-2 py-2 border-b border-maple-border">
            <div className="col-span-6">보스 / 난이도</div>
            <div className="col-span-6 text-right">결정석 가격</div>
          </div>

          <div className="divide-y divide-maple-border">
            {DEFAULT_BOSSES.map(boss => (
              Object.keys(boss.difficulties).map(diff => {
                const price = curMap[boss.id]?.[diff] ?? 0;
                const prevPrice = prevMap ? prevMap[boss.id]?.[diff] : undefined;
                const changed = prevMap && prevPrice !== undefined && prevPrice !== price;
                const down = changed && price < prevPrice;
                return (
                  <div key={`${boss.id}_${diff}`} className="grid grid-cols-12 gap-2 items-center px-2 py-2.5">
                    <div className="col-span-6 flex items-center gap-2 min-w-0">
                      <BossIcon id={boss.id} name={boss.name} icon={boss.icon} />
                      <div className="flex items-center gap-2 flex-wrap min-w-0">
                        <span className="font-medium text-slate-200 truncate">{boss.name}</span>
                        <DifficultyBadge difficulty={diff} />
                        {boss.monthly && (
                          <span className="text-[10px] font-bold tracking-wider px-2 py-0.5 rounded border bg-violet-500/15 text-violet-300 border-violet-500/40">
                            월간
                          </span>
                        )}
                      </div>
                    </div>
                    <div className="col-span-6 text-right">
                      <div className={`font-semibold ${changed ? 'text-maple-warn' : 'text-slate-200'}`}>
                        {fmtMeso(price)}
                      </div>
                      {changed && (
                        <div className="text-[11px] text-slate-500 mt-0.5">
                          이전 {fmtMeso(prevPrice)} <span className={down ? 'text-maple-good' : 'text-maple-danger'}>{down ? '▼' : '▲'}</span>
                          <span className={`ml-1 font-semibold ${down ? 'text-maple-good' : 'text-maple-danger'}`}>
                            ({down ? '-' : '+'}{fmtMeso(Math.abs(price - prevPrice))})
                          </span>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================
 * 예산 플래너 (장비창 + 목표치 + 예산 우선순위)
 * ========================================================= */
const fmtMesoShort = (n) => {
  if (!n) return '';
  if (n >= 100000000) {
    const v = n / 100000000;
    return (Number.isInteger(v) ? v : v.toFixed(1).replace(/\.0$/, '')) + '억';
  }
  if (n >= 10000) return Math.round(n / 10000).toLocaleString() + '만';
  return n.toLocaleString();
};

// 예산 라인 아이템 집계 (장비 + 심볼 + HEXA) — 플래너/요약 공용
function buildBudgetItems(character) {
  const equipment = character.equipment || {};
  const goals = character.goals || emptyGoals();
  const items = [];
  for (const slot of EQUIP_SLOTS) {
    const e = equipment[slot.id];
    if (e && ((e.cost || 0) > 0 || (e.item && e.item.trim()))) {
      items.push({ key: 'eq_' + slot.id, type: 'equip', slotId: slot.id, name: slot.name,
        label: e.item || '', star: e.star, potential: e.potential, cost: e.cost || 0,
        priority: e.priority || 0, done: !!e.done });
    }
  }
  const symCost = calcSymbolCost(goals.symbols);
  if (symCost > 0) items.push({ key: 'symbols', type: 'symbols', name: '심볼 강화', label: '아케인 · 어센틱 · 그랜드',
    cost: symCost, priority: goals.symbols.priority || 0, done: !!goals.symbols.done });
  const hx = calcHexa(character.hexaSkills, goals.solErda?.fragPrice);
  if (hx.cost > 0) items.push({ key: 'hexa', type: 'hexa', name: 'HEXA 스킬',
    label: `조각 ${hx.frag.toLocaleString()}개 × ${fmtMesoShort(parseNum(goals.solErda?.fragPrice))} · 에르다 ${hx.erda.toLocaleString()}`,
    cost: hx.cost, priority: character.hexaSkills?.priority || 0, done: !!character.hexaSkills?.done });
  const pr = (p) => (p && p > 0 ? p : Infinity);
  items.sort((a, b) => pr(a.priority) - pr(b.priority) || b.cost - a.cost);
  return items;
}
function budgetSummary(character) {
  const items = buildBudgetItems(character);
  const total = items.reduce((a, it) => a + it.cost, 0);
  const done = items.reduce((a, it) => a + (it.done ? it.cost : 0), 0);
  return { items, total, done, remaining: Math.max(0, total - done), pct: total > 0 ? (done / total) * 100 : 0 };
}

function BudgetPlanner({ character, totals, setEquipSlot, clearEquipSlot, setGoals, setBudgetTotal, setHexa }) {
  const equipment = character.equipment || {};
  const goals = character.goals || emptyGoals();
  const budget = character.budget || { total: 0 };
  const [editingSlot, setEditingSlot] = useState(null);
  const [prioOpen, setPrioOpen] = useState(true);
  const [dragIndex, setDragIndex] = useState(null);
  const scrollPosRef = useRef(0);

  const getScroller = () => document.querySelector('main');
  const openSlot = (id) => { scrollPosRef.current = getScroller()?.scrollTop || 0; setEditingSlot(id); };
  const closeSlot = () => {
    setEditingSlot(null);
    requestAnimationFrame(() => { const s = getScroller(); if (s) s.scrollTop = scrollPosRef.current; });
  };

  // 예산 라인 아이템 집계 (공용 헬퍼)
  const lineItems = useMemo(() => buildBudgetItems(character), [equipment, goals, character.hexaSkills]);

  const totalCost = lineItems.reduce((a, it) => a + it.cost, 0);
  const doneCost = lineItems.reduce((a, it) => a + (it.done ? it.cost : 0), 0);
  const remaining = Math.max(0, totalCost - doneCost);
  const progressPct = totalCost > 0 ? (doneCost / totalCost) * 100 : 0;

  // 보스 주간 수익 연동: 남은 비용 달성까지 예상 기간
  const weeklyIncome = totals.weekly || 0;
  const weeksToGoal = remaining > 0 && weeklyIncome > 0 ? Math.ceil(remaining / weeklyIncome) : null;
  const monthsToGoal = weeksToGoal ? (weeksToGoal / 4.345).toFixed(1).replace(/\.0$/, '') : null;

  const budgetTotal = budget.total || 0;
  const overBudget = budgetTotal > 0 && totalCost > budgetTotal;

  const toggleDone = (item) => {
    if (item.type === 'equip') setEquipSlot(item.slotId, { done: !item.done });
    else if (item.type === 'symbols') setGoals(g => ({ ...g, symbols: { ...g.symbols, done: !g.symbols.done } }));
    else if (item.type === 'hexa') setHexa(h => ({ ...h, done: !h.done }));
  };
  const setPriority = (item, n) => {
    if (item.type === 'equip') setEquipSlot(item.slotId, { priority: n });
    else if (item.type === 'symbols') setGoals(g => ({ ...g, symbols: { ...g.symbols, priority: n } }));
    else if (item.type === 'hexa') setHexa(h => ({ ...h, priority: n }));
  };
  // 예산 우선순위 ▲▼ 이동: 두 항목 위치를 바꾸고 1..N으로 우선순위 재부여
  const move = (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j >= lineItems.length) return;
    const arr = [...lineItems];
    const tmp = arr[idx]; arr[idx] = arr[j]; arr[j] = tmp;
    arr.forEach((it, i) => setPriority(it, i + 1));
  };
  // 드래그앤드롭: from 위치를 to 위치로 이동
  const reorderTo = (from, to) => {
    if (from == null || to == null || from === to) return;
    const arr = [...lineItems];
    const [m] = arr.splice(from, 1);
    arr.splice(to, 0, m);
    arr.forEach((it, i) => setPriority(it, i + 1));
  };

  const priorityTable = (
    <div className="bg-maple-panel border border-maple-border rounded-xl p-4 md:p-5">
      <button type="button" onClick={() => setPrioOpen(o => !o)} className="w-full flex items-center justify-between">
        <h3 className="font-semibold flex items-center gap-2"><span>📋</span> 예산 우선순위 <span className="text-xs text-slate-500 font-normal">({lineItems.length}개 · {fmtMesoShort(totalCost)})</span></h3>
        <span className="text-slate-400 text-sm">{prioOpen ? '▲ 접기' : '▼ 펼치기'}</span>
      </button>
      {!prioOpen ? null : lineItems.length === 0 ? (
        <div className="text-center py-8 text-slate-500 text-sm">
          비용이 입력된 항목이 없습니다. 장비 슬롯이나 목표치에 예상 비용을 입력해 보세요.
        </div>
      ) : (
        <>
          <div className="hidden md:grid grid-cols-12 gap-2 text-xs text-slate-400 px-2 py-2 border-b border-maple-border">
            <div className="col-span-2 text-center">순위</div>
            <div className="col-span-1 text-center">완료</div>
            <div className="col-span-4">항목</div>
            <div className="col-span-3 text-right">예상 비용</div>
            <div className="col-span-2 text-right">누적</div>
          </div>
          <div className="divide-y divide-maple-border">
            {(() => {
              let cum = 0;
              return lineItems.map((it, idx) => {
                cum += it.cost;
                return (
                  <div key={it.key}
                    draggable
                    onDragStart={() => setDragIndex(idx)}
                    onDragOver={(e) => e.preventDefault()}
                    onDrop={() => { reorderTo(dragIndex, idx); setDragIndex(null); }}
                    onDragEnd={() => setDragIndex(null)}
                    className={`grid grid-cols-12 gap-2 items-center px-2 py-2.5 transition ${it.done ? 'opacity-50' : ''} ${dragIndex === idx ? 'bg-maple-accent/10' : ''}`}>
                    <div className="col-span-3 md:col-span-2 flex items-center gap-1.5 justify-start md:justify-center">
                      <span className="text-slate-500 cursor-grab select-none" title="드래그해서 순서 변경">⠿</span>
                      <span className="text-sm font-bold text-maple-accent w-4 text-center">{idx + 1}</span>
                      <div className="flex flex-col leading-none">
                        <button type="button" onClick={() => move(idx, -1)} disabled={idx === 0}
                          className="px-1 text-slate-300 hover:text-white disabled:opacity-20">▲</button>
                        <button type="button" onClick={() => move(idx, 1)} disabled={idx === lineItems.length - 1}
                          className="px-1 text-slate-300 hover:text-white disabled:opacity-20">▼</button>
                      </div>
                    </div>
                    <div className="col-span-2 md:col-span-1 flex items-center justify-center">
                      <input type="checkbox" checked={it.done} onChange={() => toggleDone(it)} className="w-5 h-5 accent-emerald-400 cursor-pointer" />
                    </div>
                    <div className="col-span-7 md:col-span-4 min-w-0">
                      <div className={`font-medium truncate ${it.done ? 'line-through text-slate-400' : 'text-slate-100'}`}>
                        {it.name}
                        {it.type === 'equip' && it.star ? <span className="text-amber-300 text-xs ml-1">★{it.star}</span> : null}
                      </div>
                      {it.label && <div className="text-xs text-slate-500 truncate">{it.label}</div>}
                    </div>
                    <div className="col-span-7 md:col-span-3 text-right font-semibold text-emerald-300 text-sm md:text-base">{fmtMeso(it.cost)}</div>
                    <div className="col-span-5 md:col-span-2 text-right text-xs text-slate-400">{fmtMesoShort(cum)}</div>
                  </div>
                );
              });
            })()}
          </div>
          <div className="border-t-2 border-maple-border mt-3 pt-3 flex items-center justify-between">
            <div className="font-semibold">합계</div>
            <div className="font-bold text-emerald-300 text-base md:text-lg">{fmtMeso(totalCost)}</div>
          </div>
        </>
      )}
    </div>
  );

  return (
    <div className="space-y-6">
      {/* 예산 요약 */}
      <div className="bg-gradient-to-br from-emerald-500/15 to-sky-500/5 border border-emerald-500/30 rounded-xl p-5">
        <div className="flex items-start justify-between gap-3 flex-wrap">
          <div>
            <div className="text-sm text-slate-300">목표 달성 총 예산</div>
            <div className="text-2xl md:text-4xl font-bold text-emerald-300 mt-1 break-all">{fmtMeso(totalCost)}</div>
          </div>
          <div className="text-right">
            <div className="text-xs text-slate-400">남은 비용</div>
            <div className="text-lg md:text-2xl font-bold text-maple-accent break-all">{fmtMeso(remaining)}</div>
          </div>
        </div>

        <div className="mt-4">
          <div className="flex items-center justify-between text-xs text-slate-400 mb-1">
            <span>진행률 (완료 {fmtMeso(doneCost)})</span>
            <span>{progressPct.toFixed(0)}%</span>
          </div>
          <ProgressBar value={progressPct} tone="bg-emerald-400" />
        </div>

        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 mt-4">
          <div className="bg-maple-bg/40 rounded-lg px-4 py-3">
            <div className="text-xs text-slate-400">주간 보스 수익</div>
            <div className="text-sm md:text-base font-bold text-sky-300 mt-0.5 break-all">{fmtMeso(weeklyIncome)}</div>
          </div>
          <div className="bg-maple-bg/40 rounded-lg px-4 py-3">
            <div className="text-xs text-slate-400">달성까지 (수익 연동)</div>
            <div className="text-sm md:text-base font-bold text-maple-accent mt-0.5">
              {weeksToGoal ? `약 ${weeksToGoal}주 (${monthsToGoal}개월)` : remaining === 0 ? '🎉 달성!' : '수익 입력 필요'}

          <div className="bg-maple-bg/40 rounded-lg px-4 py-3 col-span-2 sm:col-span-1">
            <div className="text-xs text-slate-400">예산 한도 (선택)</div>
            <MesoInput
              value={budgetTotal}
              onChange={setBudgetTotal}
              className="w-full bg-maple-bg border border-maple-border rounded px-2 py-1 text-sm text-right mt-0.5 focus:outline-none focus:border-maple-accent"

        <div className="bg-[#243042] border-2 border-black/40 rounded-xl overflow-hidden max-w-2xl mx-auto shadow-xl">
          {/* 타이틀 바 */}

function EquipSlotCell({ slot, data, onClick }) {
  const d = normSlot(data);
  const filled = data && ((d.cost || 0) > 0 || (d.item && d.item.trim()));
  const potColor = d.potential && d.potential !== '미설정' ? POTENTIAL_STYLE[d.potential] : '';
  return (
    <button
      onClick={onClick}
      title={slot.name}
      className={`relative w-[60px] h-[60px] md:w-[76px] md:h-[76px] rounded-lg border-2 p-1 flex flex-col items-center justify-center text-center transition overflow-hidden ${
        !filled
          ? 'bg-[#16202f] border-dashed border-slate-600/70 hover:border-maple-accent/60'
          : d.done
            ? 'bg-emerald-500/40 border-emerald-400 hover:border-emerald-300'
            : 'bg-[#1b2536] border-maple-accent/60 hover:border-maple-accent'
      }`}
    >
      {filled ? (
        <>
          <div className={`text-[8px] md:text-[9px] leading-none mb-0.5 ${d.done ? 'text-emerald-100/80' : 'text-slate-500'}`}>{slot.name}</div>
          <div className={`text-[9px] md:text-[10px] font-medium leading-tight line-clamp-2 px-0.5 ${d.done ? 'text-white' : 'text-slate-100'}`}>{d.item || '—'}</div>
          <div className="flex items-center gap-1 mt-0.5">
            {d.star ? <span className="text-[9px] md:text-[10px] text-amber-300 font-bold">★{d.star}</span> : null}
            {d.potTarget ? <span className={`text-[9px] md:text-[10px] font-bold ${d.done ? 'text-white' : (potColor || 'text-lime-300')}`}>{d.potTarget}</span> : null}
          </div>
          {d.cost ? <div className={`text-[8px] md:text-[10px] font-semibold leading-none ${d.done ? 'text-emerald-50' : 'text-emerald-300'}`}>{fmtMesoShort(d.cost)}</div> : null}
          {(d.flameDone || d.jakDone) ? (
            <div className="flex items-center gap-0.5 mt-0.5">
              {d.flameDone ? <span className={`text-[8px] font-bold ${d.done ? 'text-white' : 'text-emerald-400'}`}>추✓</span> : null}
              {d.jakDone ? <span className={`text-[8px] font-bold ${d.done ? 'text-white' : 'text-sky-400'}`}>작✓</span> : null}
