      ) : (
        <>
          <div className="text-[9px] md:text-[10px] text-slate-500 leading-tight">{slot.name}</div>
          <div className="text-slate-600 text-base leading-none mt-0.5">+</div>
        </>
      )}
    </button>
  );
}

const INPUT_CLS = 'w-full bg-maple-bg border border-maple-border rounded px-3 py-2 text-sm focus:outline-none focus:border-maple-accent';

function TargetSelect({ targets, value, onChange }) {
  const has = !value || targets.includes(value);
  return (
    <select value={value || ''} onChange={(e) => onChange(e.target.value)} className={INPUT_CLS}>
      <option value="">목표 미설정</option>
      {targets.map(o => <option key={o} value={o}>{o}</option>)}
      {!has && <option value={value}>{value}</option>}
    </select>
  );
}

/* 슬롯 예상 비용 자동계산 — 스타포스(현재→목표성) + 잠재/에디(현재→목표등급 · 목표 줄수) */
function SlotAutoCost({ slot, d, cap, onFill }) {
  const { data: cube } = useCubeData();
  const partId = SLOT_TO_CUBE_PART[slot.id];
  const [open, setOpen] = useState(false);
  const [level, setLevel] = useState(200);
  const [sfCur, setSfCur] = useState(17);
  const [potCur, setPotCur] = useState('유니크');
  const [potLines, setPotLines] = useState(presetLineCount(d.potTarget));
  const [addCur, setAddCur] = useState('유니크');
  const [addLines, setAddLines] = useState(presetLineCount(d.addPotTarget));

  const tgtStar = parseNum(d.star);
  const maxStar = sfMaxStar(level);
  const sfTo = Math.min(tgtStar, maxStar);
  const sfFrom = Math.min(sfCur, sfTo);
  const sfCost = (cap.star && sfTo > sfFrom && sfTo > 0)
    ? sfExpect({ level, from: sfFrom, to: sfTo, spare: 0, mvp: 0, pcRoom: false, disc30: false, ev51015: false, boomReduce30: false, restoreDisc20: false, recover: 'spare12', guard: 'auto' }).total : 0;

  const potR = (cap.pot && partId && cube && d.potential !== '미설정')
    ? cubeAutoPotentialCost({ cube, method: 'black', partId, level, curGrade: potCur, targetGrade: d.potential, nLines: potLines }) : null;
  const potCost = potR && potR.ok ? potR.total : 0;
  const addR = (cap.addpot && partId && cube && d.addPotential !== '미설정')
    ? cubeAutoPotentialCost({ cube, method: 'addi', partId, level, curGrade: addCur, targetGrade: d.addPotential, nLines: addLines }) : null;
  const addCost = addR && addR.ok ? addR.total : 0;

  const total = Math.round(sfCost + potCost + addCost);
  const miniSel = 'bg-maple-bg border border-maple-border rounded px-1.5 py-1 text-xs focus:outline-none focus:border-maple-accent';
  const gradesUpTo = POTENTIAL_GRADES.filter(g => g !== '미설정');

  return (
    <div className="border border-maple-border rounded-lg overflow-hidden">
      <button type="button" onClick={() => setOpen(o => !o)}
        className="w-full flex items-center justify-between px-3 py-2 bg-maple-bg/60 hover:bg-maple-bg text-sm">
        <span className="flex items-center gap-1.5"><span>⚡</span> 예상 비용 자동계산 <span className="text-[10px] text-slate-500">(KMS 공식 확률)</span></span>
        <span className="text-slate-400">{open ? '▲' : '▼'}</span>
      </button>
      {open && (
        <div className="p-3 space-y-2.5 text-xs">
          <div className="flex items-center gap-2">
            <span className="text-slate-400 w-16">아이템 레벨</span>
            <input type="number" value={level} onChange={(e) => setLevel(parseNum(e.target.value))} className={miniSel + ' w-20'} />
            {!partId && cap.pot && <span className="text-amber-400/80 text-[10px]">이 부위는 잠재 확률표 없음</span>}
          </div>

          {cap.star && (
            <div className="flex items-center gap-2">
              <span className="text-slate-400 w-16">스타포스</span>
              <span>현재</span>
              <input type="number" min="0" max="30" value={sfCur} onChange={(e) => setSfCur(Math.min(30, Math.max(0, parseNum(e.target.value))))} className={miniSel + ' w-14'} />
              <span>→ 목표 <b className="text-amber-300">{tgtStar || 0}★</b></span>
              <span className="ml-auto text-emerald-300 font-semibold">{sfCost > 0 ? fmtMeso(Math.round(sfCost)) : '-'}</span>
            </div>
          )}

          {cap.pot && (
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-slate-400 w-16">잠재</span>
              <select value={potCur} onChange={(e) => setPotCur(e.target.value)} className={miniSel}>{gradesUpTo.map(g => <option key={g}>{g}</option>)}</select>
              <span>→ <b className="text-amber-300">{d.potential}</b></span>
              <select value={potLines} onChange={(e) => setPotLines(Number(e.target.value))} className={miniSel}>
                <option value={1}>1줄</option><option value={2}>2줄</option><option value={3}>3줄</option>
              </select>
              <span className="ml-auto text-emerald-300 font-semibold">{potCost > 0 ? fmtMeso(Math.round(potCost)) : '-'}</span>
            </div>
          )}

          {cap.addpot && d.addPotential !== '미설정' && (
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-slate-400 w-16">에디</span>
              <select value={addCur} onChange={(e) => setAddCur(e.target.value)} className={miniSel}>{gradesUpTo.map(g => <option key={g}>{g}</option>)}</select>
              <span>→ <b className="text-amber-300">{d.addPotential}</b></span>
              <select value={addLines} onChange={(e) => setAddLines(Number(e.target.value))} className={miniSel}>
                <option value={1}>1줄</option><option value={2}>2줄</option><option value={3}>3줄</option>
              </select>
              <span className="ml-auto text-emerald-300 font-semibold">{addCost > 0 ? fmtMeso(Math.round(addCost)) : '-'}</span>
            </div>
          )}

          <div className="flex items-center justify-between pt-2 border-t border-maple-border">
            <span className="text-slate-300 font-semibold">합계 <span className="text-maple-accent">{fmtMeso(total)}</span></span>
            <button type="button" onClick={() => onFill(total)} disabled={total <= 0}
              className={`px-3 py-1.5 rounded text-xs font-semibold ${total > 0 ? 'bg-maple-accent text-slate-900 hover:bg-amber-300' : 'bg-maple-bg text-slate-500 cursor-not-allowed'}`}>
              예상 비용에 채우기
            </button>
          </div>
          <p className="text-[10px] text-slate-500">스타포스는 12성 복구·스페어 0·최적 파방 기준, 잠재는 목표 줄수만큼 부위별 강옵 3줄 조합 추정입니다.</p>
        </div>
      )}
    </div>
  );
}

          {cap.pot && (

          {(cap.flame || cap.jak) && (

          <div className="text-[11px] text-slate-500 -mb-1">── 예산 ──</div>

          <div>

          onChange={(e) => onChange({ ...value, cur: Math.min(max, Math.max(0, parseNum(e.target.value))) })}

        <span className="text-slate-500 text-xs">→</span>
        <input type="number" min="0" max={max} value={value.tgt} placeholder="목표"
          onChange={(e) => onChange({ ...value, tgt: Math.min(max, Math.max(0, parseNum(e.target.value))) })}

      {need > 0 && (

          심볼 필요 {need.toLocaleString()}개
        </div>
      )}
    </div>
  );
}

function GoalsPanel({ goals, setGoals }) {
  const lvl = goals.level || { current: '', target: '', percent: '' };
  const lvlCur = parseNum(lvl.current), lvlTgt = parseNum(lvl.target), lvlPctVal = parseNum(lvl.percent);
  // 진행률: (현재레벨 + 현재경험치%) / 목표레벨
  const lvlPct = lvlTgt > 0 ? Math.min(100, ((lvlCur + lvlPctVal / 100) / lvlTgt) * 100) : 0;
  const hexa = goals.hexa || [false, false, false];

  const setArcane = (id, v) => setGoals(g => ({ ...g, symbols: { ...g.symbols, arcane: { ...g.symbols.arcane, [id]: v } } }));
  const setAuthentic = (id, v) => setGoals(g => ({ ...g, symbols: { ...g.symbols, authentic: { ...g.symbols.authentic, [id]: v } } }));
  const setGrand = (id, v) => setGoals(g => ({ ...g, symbols: { ...g.symbols, grand: { ...(g.symbols.grand || {}), [id]: v } } }));
  const toggleHexa = (i) => setGoals(g => { const h = [...(g.hexa || [false, false, false])]; h[i] = !h[i]; return { ...g, hexa: h }; });
  const symbolCost = calcSymbolCost(goals.symbols);

  return (
    <div className="bg-maple-panel border border-maple-border rounded-xl p-4 md:p-5 space-y-6">
      <h3 className="font-semibold flex items-center gap-2"><span>🎯</span> 목표치</h3>

      {/* 레벨 */}
      <div>
        <div className="text-sm font-medium text-slate-300 mb-2 flex items-center gap-2"><span>⬆️</span> 레벨 <span className="text-xs text-slate-500 font-normal">({lvlPct.toFixed(1)}% 달성)</span></div>
        <div className="flex items-center gap-2 flex-wrap">
          <input type="number" min="1" max="300" value={lvl.current} placeholder="현재"
            onChange={(e) => setGoals(g => ({ ...g, level: { ...g.level, current: parseNum(e.target.value) } }))}
            className="w-20 bg-maple-bg border border-maple-border rounded px-3 py-2 text-sm text-center focus:outline-none focus:border-maple-accent" />
          <div className="relative">
            <input type="number" min="0" max="100" value={lvl.percent} placeholder="경험치"
              onChange={(e) => setGoals(g => ({ ...g, level: { ...g.level, percent: Math.min(100, Math.max(0, parseNum(e.target.value))) } }))}
              className="w-20 bg-maple-bg border border-maple-border rounded px-3 py-2 text-sm text-center focus:outline-none focus:border-maple-accent" />
            <span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-slate-500">%</span>
          </div>
          <span className="text-slate-500">→</span>
          <input type="number" min="1" max="300" value={lvl.target} placeholder="목표"
            onChange={(e) => setGoals(g => ({ ...g, level: { ...g.level, target: parseNum(e.target.value) } }))}
            className="w-20 bg-maple-bg border border-maple-border rounded px-3 py-2 text-sm text-center focus:outline-none focus:border-maple-accent" />
          <div className="flex-1 min-w-[80px]"><ProgressBar value={lvlPct} tone="bg-amber-400" /></div>
        </div>
      </div>

      {/* 헥사 스탯 */}
      <div className="pt-4 border-t border-maple-border">
        <div className="text-sm font-medium text-slate-300 mb-2 flex items-center gap-2"><span>🔷</span> 헥사 스탯 (1·2·3 완료)</div>
        <div className="flex gap-2">
          {[0, 1, 2].map(i => (
            <button key={i} type="button" onClick={() => toggleHexa(i)}
              className={`flex-1 rounded border px-3 py-2 text-sm font-semibold transition ${hexa[i] ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-300' : 'bg-maple-bg border-maple-border text-slate-400'}`}>
              스탯 {i + 1} {hexa[i] ? '✓' : ''}
            </button>
          ))}
        </div>
      </div>

      {/* 심볼 */}
      <div className="pt-4 border-t border-maple-border">
        <div className="text-sm font-medium text-slate-300 mb-3 flex items-center gap-2"><span>🔮</span> 심볼 (현재 → 목표 레벨)</div>
        <div className="grid md:grid-cols-2 gap-x-6 gap-y-2">
          <div className="space-y-2">
            <div className="text-xs text-sky-300 font-semibold">아케인심볼 (최대 {ARCANE_MAX})</div>
            {ARCANE_REGIONS.map(r => (
              <SymbolRow key={r.id} name={r.name} max={ARCANE_MAX} kind="arcane" value={goals.symbols.arcane[r.id] || { cur: '', tgt: '' }} onChange={(v) => setArcane(r.id, v)} />
            ))}
          </div>
          <div className="space-y-2 mt-3 md:mt-0">
            <div className="text-xs text-violet-300 font-semibold">어센틱심볼 (최대 {AUTHENTIC_MAX})</div>
            {AUTHENTIC_REGIONS.map(r => (
              <SymbolRow key={r.id} name={r.name} max={AUTHENTIC_MAX} kind="auth" value={goals.symbols.authentic[r.id] || { cur: '', tgt: '' }} onChange={(v) => setAuthentic(r.id, v)} />
            ))}
          </div>
        </div>
        <div className="mt-4">
          <div className="text-xs text-rose-300 font-semibold mb-2">그랜드 어센틱심볼 (최대 {GRAND_MAX})</div>
          <div className="grid md:grid-cols-2 gap-x-6 gap-y-2">
            {GRAND_REGIONS.map(r => (
              <SymbolRow key={r.id} name={r.name} max={GRAND_MAX} kind="auth" value={(goals.symbols.grand || {})[r.id] || { cur: '', tgt: '' }} onChange={(v) => setGrand(r.id, v)} />
            ))}
          </div>
        </div>
        <div className="mt-4 bg-maple-bg/50 border border-maple-border rounded-lg px-4 py-2.5 flex items-center justify-between">
          <div className="text-[11px] text-slate-400">심볼 강화 예상 비용 (현재→목표 자동계산)</div>
          <div className="text-base font-bold text-emerald-300">{fmtMeso(symbolCost)}</div>
        </div>
        <p className="text-[11px] text-slate-500 mt-2">※ 아케인·어센틱·그랜드 어센틱 전 지역 정확 가격표 기준으로 자동 계산됩니다.</p>
      </div>
    </div>
  );
}

/* =========================================================
 * 심볼 가격 (레벨별 강화비용 기록)

function SymbolCostTable({ title, accent, regions, table, maxLevel }) {
  const levels = [];
  for (let L = 2; L <= maxLevel; L++) levels.push(L);
  return (
    <div className="bg-maple-panel border border-maple-border rounded-xl p-4 md:p-5">
      <h3 className={`font-semibold mb-3 ${accent}`}>{title}</h3>
      <div className="overflow-x-auto">
        <table className="w-full text-[11px] md:text-xs border-collapse min-w-[640px]">
          <thead>
            <tr className="text-slate-400 border-b border-maple-border">
              <th className="text-left py-1.5 px-2 sticky left-0 bg-maple-panel">도달</th>
              {regions.map(r => <th key={r.id} className="text-right py-1.5 px-2 whitespace-nowrap">{r.name}</th>)}
            </tr>
          </thead>
          <tbody>
            {levels.map(L => (
              <tr key={L} className="border-b border-maple-border/40">
                <td className="py-1 px-2 text-slate-300 sticky left-0 bg-maple-panel">{L}렙</td>
                {regions.map(r => {
                  const arr = table[r.id] || [];
                  const step = (arr[L] || 0) - (arr[L - 1] || 0);
                  return <td key={r.id} className="text-right py-1 px-2 text-slate-200 tabular-nums">{step.toLocaleString()}</td>;
                })}
              </tr>
            ))}
            <tr className="border-t-2 border-maple-border font-bold">
              <td className="py-1.5 px-2 text-maple-accent sticky left-0 bg-maple-panel">합계</td>
              {regions.map(r => {
                const arr = table[r.id] || [];
                return <td key={r.id} className="text-right py-1.5 px-2 text-emerald-300 tabular-nums">{(arr[maxLevel] || 0).toLocaleString()}</td>;
              })}
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

            <div><div className="text-xs text-slate-400">남은 비용</div><div className="text-base md:text-xl font-bold text-maple-accent break-all">{fmtMeso(grand.remaining)}</div></div>

          <div className="flex gap-4 overflow-x-auto pb-3">
            {cards.map(({ c, s, weekly }) => {

                    <div className="text-center text-slate-600 text-xs py-6">입력된 예산 없음</div>
                  ) : (
                    <div className="space-y-1 text-xs">
                      {s.items.map(it => (
                        <div key={it.key} className={`flex justify-between gap-2 ${it.done ? 'text-slate-500 line-through' : 'text-slate-300'}`}>
                          <span className="truncate">{it.done ? '✓ ' : ''}{it.name}{it.type === 'equip' && it.star ? `★${it.star}` : ''}</span>
                          <span className="text-emerald-300 whitespace-nowrap">{fmtMesoShort(it.cost)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="border-t border-dashed border-slate-600 mt-2 pt-2 space-y-1 text-xs">
                    <div className="flex justify-between"><span className="text-slate-400">총 예산</span><span className="font-bold text-emerald-300">{fmtMesoShort(s.total)}</span></div>
                    <div className="flex justify-between"><span className="text-slate-400">완료</span><span className="text-sky-300">{fmtMesoShort(s.done)}</span></div>
                    <div className="flex justify-between"><span className="text-slate-400">남음</span><span className="text-maple-accent font-bold">{fmtMesoShort(s.remaining)}</span></div>
                    <div className="flex justify-between"><span className="text-slate-400">진행률</span><span className="text-slate-200">{s.pct.toFixed(0)}%</span></div>

              );
            })}

        </>
      )}

  const [c, setC] = useState({ method: 'black', partId: 1, level: 200, curGrade: '유니크' });
  const set = (k, v) => setC(p => ({ ...p, [k]: v }));
  const [fails, setFails] = useState({ r2e: 0, e2u: 0, u2l: 0 });
  const [picks, setPicks] = useState(['any', 'any', 'any']);
  const [pickCtx, setPickCtx] = useState(null); // picks가 속한 문맥 키

  // 현재 문맥의 줄별 옵션 목록 (확률 내림차순)
  const lineOpts = useMemo(() => {
    if (!cube) return null;
    const rows = cubeLineRows(cube, c.method, c.partId, c.level);
    return rows ? { missing: false, lines: rows } : { missing: true, lines: [] };
  }, [cube, c.method, c.partId, c.level]);

  const pickDefault = (rows, li) => cubePickStrong(rows, li);
  // 옵션 문맥(줄 분포)이 실제로 바뀌면 렌더 중 동기적으로 기본 선택 재설정 (페인트 전 → 깜빡임 없음)
  // 같은 버킷 내 레벨 편집은 ctxKey가 그대로라 선택 유지
  const ctxKey = cubeContextKey(c.method, c.partId, c.level);
  let effPicks = picks;
  if (lineOpts && !lineOpts.missing && pickCtx !== ctxKey) {
    effPicks = lineOpts.lines.map((rows, li) => pickDefault(rows, li));
    setPicks(effPicks);
    setPickCtx(ctxKey);
  }

  const partName = cube ? (cube.parts.find(p => p[1] === c.partId) || ['', c.partId])[0] : '';
  const roll = cube && lineOpts && !lineOpts.missing ? cubeExactRoll(cube, c.method, c.partId, c.level, effPicks) : null;
  const gup = cubeGradeUp({ method: c.method, level: c.level, curGrade: c.curGrade, fails });
  const gi = (g) => GRADES.indexOf(g);
  const upgrading = gi(c.curGrade) < gi('레전드리');
  const costL = cubeMesoCost(gup.way, c.level, '레전드리');
  const H4 = roll ? roll.perRoll : 0;
  const targetTries = H4 > 0 ? (upgrading ? (1 - H4) / H4 : 1 / H4) : 0;
  const totalTries = gup.tries + targetTries;
  const totalMeso = gup.meso + targetTries * costL;
  const q = (v) => H4 <= 0 ? null : H4 >= 1 ? 1 : Math.ceil(Math.log(1 - v) / Math.log(1 - H4));
  const levelErr = c.level < 1 || c.level > 250;

  const setPick = (li, v) => setPicks(p => { const n = [...p]; n[li] = v === 'any' ? 'any' : Number(v); return n; });
  const LINE_LABEL = ['1번째 줄', '2번째 줄', '3번째 줄'];
  const fmtPct = (p) => (p * 100 < 0.01 && p > 0) ? (p * 100).toFixed(6) + '%' : (p * 100).toFixed(4) + '%';

  return (
    <div className="bg-maple-panel border border-maple-border rounded-xl p-4 md:p-5 space-y-5">
      <div>
        <h3 className="font-semibold mb-1 flex items-center gap-2"><span>🎲</span> 잠재 정밀 기대비용</h3>
        <p className="text-xs text-slate-400 mb-3">KMS 공식 확률 · 부위·레벨별 줄 옵션 직접 선택 · 순차 제한 재정규화 · 천장 반영 · 등급업+목표옵션 통합</p>

        <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
          <CalcField label="잠재 종류">
            <select value={c.method} onChange={(e) => set('method', e.target.value)} className={SEL_CLS + ' w-full'}>
              <option value="black">일반/블랙 (메소)</option><option value="addi">에디셔널 (메소)</option>
            </select>
          </CalcField>
          <CalcField label="장비 부위">
            <select value={c.partId} onChange={(e) => set('partId', Number(e.target.value))} className={SEL_CLS + ' w-full'} disabled={!cube}>
              {cube ? cube.parts.map(([nm, id]) => <option key={id} value={id}>{nm}</option>) : <option value={c.partId}>로딩…</option>}
            </select>
          </CalcField>
          <CalcField label="장비 레벨"><input type="number" value={c.level} onChange={(e) => set('level', parseNum(e.target.value))} className={SEL_CLS + ' w-full'} /></CalcField>
          <CalcField label="현재 등급">
            <select value={c.curGrade} onChange={(e) => set('curGrade', e.target.value)} className={SEL_CLS + ' w-full'}>{GRADES.map(x => <option key={x}>{x}</option>)}</select>
          </CalcField>
          <CalcField label="목표 등급"><div className="bg-maple-bg/60 border border-maple-border rounded px-2 py-1.5 text-sm text-amber-300 font-semibold">레전드리</div></CalcField>
        </div>

        {upgrading && (
          <div className="grid grid-cols-3 gap-3 mt-3">
            {gi(c.curGrade) <= 0 && <CalcField label="레어→에픽 연속 실패"><input type="number" value={fails.r2e} onChange={(e) => setFails(f => ({ ...f, r2e: parseNum(e.target.value) }))} className={SEL_CLS + ' w-full'} /></CalcField>}
            {gi(c.curGrade) <= 1 && <CalcField label="에픽→유니크 연속 실패"><input type="number" value={fails.e2u} onChange={(e) => setFails(f => ({ ...f, e2u: parseNum(e.target.value) }))} className={SEL_CLS + ' w-full'} /></CalcField>}
            {gi(c.curGrade) <= 2 && <CalcField label="유니크→레전 연속 실패"><input type="number" value={fails.u2l} onChange={(e) => setFails(f => ({ ...f, u2l: parseNum(e.target.value) }))} className={SEL_CLS + ' w-full'} /></CalcField>}
          </div>
        )}
      </div>

      {cubeErr ? (
        <div className="bg-red-500/10 border border-red-500/40 text-red-200 text-xs rounded px-3 py-2">⚠️ 옵션 확률 데이터를 불러오지 못했습니다. 네트워크 확인 후 새로고침하세요.</div>
      ) : !cube ? (
        <div className="text-slate-400 text-sm py-4 text-center">공식 옵션 확률 데이터 로딩 중…</div>
      ) : levelErr ? (
        <div className="bg-amber-500/10 border border-amber-500/40 text-amber-200 text-xs rounded px-3 py-2">⚠️ 장비 레벨은 1~250 범위로 입력하세요. (현재 {c.level || 0})</div>
      ) : lineOpts.missing ? (
        <div className="bg-amber-500/10 border border-amber-500/40 text-amber-200 text-xs rounded px-3 py-2">이 부위·레벨 조합의 공식 옵션 문맥이 없습니다. (레벨 1~250, 지원 부위 확인)</div>
      ) : (
        <>
          {/* 목표 옵션 3줄 선택 */}
          <div className="border-t border-maple-border pt-4">
            <div className="flex items-center gap-2 mb-2"><span>🎯</span><h4 className="font-semibold text-sm">목표 옵션 (레전드리 3줄)</h4></div>
            <div className="space-y-2">
              {[0, 1, 2].map(li => {
                const rows = lineOpts.lines[li] || [];
                const cur = effPicks[li];
                const info = roll && roll.lines[li];
                return (
                  <div key={li} className="grid grid-cols-12 gap-2 items-center">
                    <span className="col-span-3 md:col-span-2 text-xs text-slate-400">{LINE_LABEL[li]}</span>
                    <select value={cur === 'any' ? 'any' : String(cur)} onChange={(e) => setPick(li, e.target.value)}
                      className={SEL_CLS + ' col-span-6 md:col-span-7 w-full text-xs'}>
                      <option value="any">— 아무거나 (무시) —</option>
                      {rows.map(r => <option key={r.idx} value={r.idx}>{r.text} ({fmtPct(r.prob)})</option>)}
                    </select>
                    <span className="col-span-3 text-right text-xs">
                      {cur === 'any' ? <span className="text-slate-500">100%</span>
                        : info && info.p > 0 ? <span className="text-emerald-300 font-semibold">{fmtPct(info.p)}</span>
                        : <span className="text-red-300">제약상 불가</span>}
                    </span>
                  </div>
                );
              })}
            </div>
            {roll && roll.lines.some(l => l.excl > 0) && (
              <p className="text-[10px] text-slate-500 mt-1.5">※ 앞줄 제한(쓸만한 스킬·피격 옵션)으로 뒷줄 확률이 공식 재정규화되었습니다.</p>
            )}
          </div>

          {/* 결과 */}
          <div className="bg-maple-bg/50 border border-maple-border rounded-lg px-4 py-3">
            <div className="text-xs text-slate-500 mb-1">{partName} · Lv.{c.level} · {c.method === 'black' ? '일반/블랙' : '에디셔널'} · {c.curGrade} → 레전드리</div>

            {gup.rows.length > 0 && (
              <div className="mb-2">
                {gup.rows.map(st => (
                  <div key={st.from} className="flex items-center justify-between text-[11px] py-0.5 text-slate-400">
                    <span>등급업 {st.from} → {st.to}</span>
                    <span>기대 {st.tries.toFixed(1)}회 · {fmtMeso(Math.round(st.meso))}</span>
                  </div>
                ))}
              </div>
            )}

            <ResultRow label="1회 목표 성공확률" value={H4 > 0 ? fmtPct(H4) : '0% (불가)'} />
            <ResultRow label="목표 옵션 기대 재설정" value={H4 > 0 ? Math.round(1 / H4).toLocaleString() + '회' : '-'} />
            {gup.rows.length > 0 && <ResultRow label="등급업 기대 메소" value={fmtMeso(Math.round(gup.meso))} />}
            <div className="border-t border-maple-border mt-1.5 pt-1.5">
              <ResultRow label="총 기대 유료 재설정 (통합)" value={H4 > 0 ? Math.round(totalTries).toLocaleString() + '회' : '-'} />
              <ResultRow label="총 기대 메소 (통합)" value={H4 > 0 ? fmtMeso(Math.round(totalMeso)) : '목표 도달 불가'} strong />
            </div>
            {upgrading && gup.rows.length > 0 && (
              <p className="text-[10px] text-slate-500 mt-1">※ 등급업 성공 롤이 레전드리 3줄을 생성하므로 목표옵션 1회를 중복 가산하지 않습니다.</p>
            )}

            {H4 > 0 && H4 < 1 && (
              <div className="mt-2 pt-2 border-t border-dashed border-maple-border grid grid-cols-4 gap-1 text-center">
                {[[0.5, '50%'], [0.9, '90%'], [0.95, '95%'], [0.99, '99%']].map(([v, lbl]) => (
                  <div key={lbl}>
                    <div className="text-[10px] text-slate-500">{lbl} 달성</div>
                    <div className="text-xs font-semibold text-sky-300">{q(v).toLocaleString()}회</div>
                  </div>
                ))}
              </div>
            )}
          </div>
          <p className="text-[10px] text-slate-500">공식 페이지 반올림 표시확률 기반 근사값입니다. 현재 3줄과 완전히 동일한 결과의 내부 재추첨은 반영하지 않습니다. (기준일 2026-07-13)</p>
        </>
      )}
    </div>
  );
}

function EnhanceCalcView() {
  return (
    <div className="max-w-5xl mx-auto space-y-6">
      <div>
        <h2 className="text-2xl md:text-3xl font-bold">⭐ 강화 기대비용</h2>
        <p className="text-slate-400 mt-1">스타포스·잠재 정밀 기대비용 (KMS 공식 확률·천장·재정규화·흔적 복구 반영)</p>
      </div>
      <StarforceCalc />
      <PotentialCalc />
    </div>
  );
}

/* =========================================================
 * 마운트
 * ========================================================= */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

/* =========================================================
 * 서비스워커 등록
 * ========================================================= */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>

</body>
</html>
