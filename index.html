const fmtMeso = (n) => {
  if (!n || n === 0) return '0 메소';
  const eok = Math.floor(n / 100000000);
  const man = Math.floor((n % 100000000) / 10000);
  const won = n % 10000;
  const parts = [];
  if (eok) parts.push(`${eok.toLocaleString()}억`);
  if (man) parts.push(`${man.toLocaleString()}만`);
  if (!eok && !man && won) parts.push(won.toLocaleString());
  return (parts.join(' ') || '0') + ' 메소';
};

  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
};

const daysUntil = (dateStr) => {
  if (!dateStr) return null;
  const t = new Date(dateStr + 'T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.ceil((t - today) / (1000 * 60 * 60 * 24));
};

};

// 솔 에르다 조각 예상 비용 = 조각 단가 × 필요 갯수(목표-현재)
const solErdaNeed = (se) => Math.max(0, parseNum(se?.fragTgt) - parseNum(se?.fragCur));
const calcSolErdaCost = (se) => solErdaNeed(se) * parseNum(se?.fragPrice);

// 한 지역의 현재→목표 누적비용 차이
const symbolRegionCost = (table, id, cur, tgt) => {
  const arr = table[id];
  if (!arr) return 0;
  const lo = Math.max(0, Math.min(arr.length - 1, parseNum(cur)));
  const hi = Math.max(0, Math.min(arr.length - 1, parseNum(tgt)));
  if (hi <= lo) return 0;
  return (arr[hi] || 0) - (arr[lo] || 0);
};
// 전체 심볼 강화 예상 비용
const calcSymbolCost = (symbols) => {
  if (!symbols) return 0;
  let sum = 0;
  for (const r of ARCANE_REGIONS) sum += symbolRegionCost(ARCANE_COST, r.id, (symbols.arcane?.[r.id] || {}).cur, (symbols.arcane?.[r.id] || {}).tgt);
  for (const r of AUTHENTIC_REGIONS) sum += symbolRegionCost(AUTHENTIC_COST, r.id, (symbols.authentic?.[r.id] || {}).cur, (symbols.authentic?.[r.id] || {}).tgt);
  for (const r of GRAND_REGIONS) sum += symbolRegionCost(GRAND_COST, r.id, (symbols.grand?.[r.id] || {}).cur, (symbols.grand?.[r.id] || {}).tgt);
  return sum;
};

/* =========================================================
 * 만료 알림 (브라우저 Notification + 페이지 배너)
 * - D-1, D-day 항목만 노출
 * - 같은 날짜에는 한 번만 알림 (localStorage로 중복 방지)
 * ========================================================= */
function useExpiryNotifications(characters) {
  const [permission, setPermission] = useState(() =>
    typeof Notification !== 'undefined' ? Notification.permission : 'unsupported'
  );
  const [pending, setPending] = useState([]);

  // 페이지 진입 시 알림 권한 자동 요청 (한 번만)
  useEffect(() => {
    if (typeof Notification === 'undefined') return;
    if (Notification.permission === 'default') {
      Notification.requestPermission().then(p => setPermission(p)).catch(() => {});
    }
  }, []);

  // 만료/임박 항목 탐지
  useEffect(() => {
    const items = [];
    for (const c of characters) {
      for (const [k, v] of Object.entries(c.durations || {})) {
        if (!v) continue;
        const d = daysUntil(v);
        if (d === 0 || d === 1 || (d !== null && d < 0)) {
          items.push({
            charName: c.name,
            charId: c.id,
            type: k,
            typeLabel: TYPE_LABEL[k] || k,
            date: v,
            days: d,
          });
        }
      }
    }
    setPending(items);

    // 브라우저 알림 발송 (오늘 한 번만)
    if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    const today = todayStr();
    const shown = loadLS(LS_KEYS.NOTIF_SHOWN, { date: '', keys: [] });
    if (shown.date !== today) shown.keys = [];
    const nextKeys = [...shown.keys];
    for (const it of items) {
      const key = `${it.charId}|${it.type}|${it.date}|${it.days}`;
      if (nextKeys.includes(key)) continue;
      const title =
        it.days < 0 ? `[만료됨] ${it.charName} - ${it.typeLabel}` :
        it.days === 0 ? `[오늘 만료] ${it.charName} - ${it.typeLabel}` :
        `[내일 만료] ${it.charName} - ${it.typeLabel}`;
      const body = `${it.typeLabel} 만료일: ${it.date}`;
      try {
        new Notification(title, { body, icon: 'icon.svg', tag: key });
      } catch {}
      nextKeys.push(key);
    }
    saveLS(LS_KEYS.NOTIF_SHOWN, { date: today, keys: nextKeys });
  }, [characters]);

  const askPermission = () => {
    if (typeof Notification === 'undefined') return;
    Notification.requestPermission().then(p => setPermission(p)).catch(() => {});
  };

  return { pending, permission, askPermission };
}

function App() {
  const [characters, setCharacters] = useState(() => loadLS(LS_KEYS.CHARS, []).map(normalizeChar));
  const [bossData, setBossData]     = useState(() => loadLS(LS_KEYS.BOSS_DATA, DEFAULT_BOSSES));
  const [selected, setSelected]     = useState(() => loadLS(LS_KEYS.SELECTED, 'dashboard'));
  const [sidebarOpen, setSidebarOpen] = useState(false);

  useEffect(() => saveLS(LS_KEYS.CHARS, characters), [characters]);
  useEffect(() => saveLS(LS_KEYS.BOSS_DATA, bossData), [bossData]);
  useEffect(() => saveLS(LS_KEYS.SELECTED, selected), [selected]);

  const { pending, permission, askPermission } = useExpiryNotifications(characters);

  // 캐릭터별 총 수익 계산 (주간 / 월간 분리)
  const charTotals = useMemo(() => {
    const map = {};
    for (const c of characters) {
      let weekly = 0, monthly = 0;
      for (const row of (c.bosses || [])) {
        const boss = bossData.find(b => b.id === row.bossId);
        if (!boss) continue;
        const { price } = getDifficultyEntry(boss, row.difficulty);
        const members = Math.max(1, row.partyMembers || 1);
        const rev = Math.floor(price / members);
        if (boss.monthly) monthly += rev;
        else weekly += rev;
      }
      map[c.id] = { weekly, monthly, total: weekly + monthly };
    }
    return map;
  }, [characters, bossData]);

  const grandTotal = useMemo(
    () => Object.values(charTotals).reduce(
      (a, t) => ({
        weekly: a.weekly + t.weekly,
        monthly: a.monthly + t.monthly,
        total: a.total + t.total,
      }),
      { weekly: 0, monthly: 0, total: 0 }
    ),
    [charTotals]
  );

  const addCharacter = useCallback((name) => {
    const newChar = {
      id: uid(),
      name: name?.trim() || `캐릭터${characters.length + 1}`,
      durations: {
        pet: '',
        label_hat: '', label_clothes: '', label_shoes: '', label_cape: '', label_weapon: '',
        specialCore: '',
      },
      bosses: [],
      equipment: {},
      goals: emptyGoals(),
      budget: { total: 0 },
    };
    setCharacters(prev => [...prev, newChar]);
    setSelected(newChar.id);
    setSidebarOpen(false);
  }, [characters]);

  const removeCharacter = useCallback((id) => {
    if (!confirm('이 캐릭터를 삭제할까요? 되돌릴 수 없습니다.')) return;
    setCharacters(prev => prev.filter(c => c.id !== id));
    setSelected('dashboard');
  }, []);

  const updateCharacter = useCallback((id, updater) => {
    setCharacters(prev => prev.map(c => c.id === id ? updater(c) : c));
  }, []);

  return (
    <div className="flex h-full w-full overflow-hidden">
      {sidebarOpen && (
        <div
          className="fixed inset-0 bg-black/60 z-30 md:hidden"
          onClick={() => setSidebarOpen(false)}
        />
      )}

      <Sidebar
        characters={characters}
        charTotals={charTotals}
        selected={selected}
        onSelect={(id) => { setSelected(id); setSidebarOpen(false); }}
        onAdd={addCharacter}
        onRemove={removeCharacter}
        open={sidebarOpen}
      />

      <main className="flex-1 overflow-y-auto">
        <header className="sticky top-0 z-20 bg-maple-bg/80 backdrop-blur border-b border-maple-border px-4 py-3 flex items-center gap-3 md:hidden">
          <button
            onClick={() => setSidebarOpen(true)}
            className="p-2 -ml-2 rounded hover:bg-maple-panel"
            aria-label="메뉴"
          >
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M3 6h18M3 12h18M3 18h18" />
            </svg>
          </button>
          <h1 className="text-lg font-bold text-maple-accent">🍁 메이플 체크</h1>
        </header>

        <div className="p-4 md:p-8">
          {/* 상단 알림 배너: D-1 / D-day / 만료됨 */}
          {pending.length > 0 && (
            <ExpiryBanner
              items={pending}
              permission={permission}
              onAskPermission={askPermission}
              onSelect={(id) => setSelected(id)}
            />
          )}

          {selected === 'dashboard' && (
            <Dashboard
              characters={characters}
              charTotals={charTotals}
              grandTotal={grandTotal}
              onSelect={setSelected}
            />
          )}
          {selected === 'boss_data' && (
            <BossDataEditor bossData={bossData} setBossData={setBossData} />
          )}
          {selected === 'boss_history' && (
            <BossHistoryView />
          )}
          {selected === 'symbol_price' && (
            <SymbolPriceView />
          )}
          {characters.find(c => c.id === selected) && (
            <CharacterView
              character={characters.find(c => c.id === selected)}
              bossData={bossData}
              totals={charTotals[selected] || { weekly: 0, monthly: 0, total: 0 }}
              onUpdate={(updater) => updateCharacter(selected, updater)}
              onRemove={() => removeCharacter(selected)}
            />
          )}
        </div>

        <footer className="px-6 py-8 text-center text-xs text-slate-500">
          메이플 체크 · 데이터는 이 브라우저에만 저장됩니다 · {new Date().getFullYear()}
        </footer>
      </main>
    </div>
  );
}

function CharacterView({ character, bossData, totals, onUpdate, onRemove }) {
  const [editName, setEditName] = useState(false);
  const [nameInput, setNameInput] = useState(character.name);
  const [tab, setTab] = useState('boss');

  useEffect(() => { setNameInput(character.name); setTab('boss'); }, [character.id]);

  const setDuration = (key, value) => {
    onUpdate(c => ({ ...c, durations: { ...c.durations, [key]: value } }));
  };

  const setEquipSlot = (slotId, patch) => {
    onUpdate(c => ({
      ...c,
      equipment: {
        ...c.equipment,
        [slotId]: { ...emptyEquipSlot(), ...(c.equipment?.[slotId] || {}), ...patch },
      },
    }));
  };
  const clearEquipSlot = (slotId) => {
    onUpdate(c => {
      const next = { ...c.equipment };
      delete next[slotId];
      return { ...c, equipment: next };
    });
  };
  const setGoals = (updater) => {
    onUpdate(c => ({ ...c, goals: updater(c.goals || emptyGoals()) }));
  };
  const setBudgetTotal = (n) => {
    onUpdate(c => ({ ...c, budget: { ...(c.budget || {}), total: n } }));
  };

  const WEEKLY_LIMIT = 12;

  const toggleBoss = (bossId, difficulty) => {
    onUpdate(c => {
      let list = c.bosses || [];
      const boss = bossData.find(b => b.id === bossId);
      const idx = list.findIndex(b => b.bossId === bossId && b.difficulty === difficulty);
      if (idx >= 0) {
        // 선택 해제
        return { ...c, bosses: list.filter((_, i) => i !== idx) };
      }
      // 같은 보스는 한 난이도만 선택 가능 → 같은 보스의 다른 난이도는 자동 해제
      list = list.filter(b => b.bossId !== bossId);
      // 주간 12개 한도: 월간 보스는 카운트에서 제외
      if (!boss?.monthly) {
        const weeklyCount = list.filter(b => {
          const bd = bossData.find(x => x.id === b.bossId);
          return !bd?.monthly;
        }).length;
        if (weeklyCount >= WEEKLY_LIMIT) return c; // 안전장치
      }
      return {
        ...c,
        bosses: [...list, {
          rowId: 'r_' + Math.random().toString(36).slice(2, 8),
          bossId, difficulty, partyMembers: 1
        }]
      };
    });
  };

  const setBossMembers = (bossId, difficulty, n) => {
    onUpdate(c => ({
      ...c,
      bosses: (c.bosses || []).map(b =>
        (b.bossId === bossId && b.difficulty === difficulty)
          ? { ...b, partyMembers: n }
          : b
      )
    }));
  };

  const saveName = () => {
    const v = nameInput.trim();
    if (v) onUpdate(c => ({ ...c, name: v }));
    setEditName(false);
  };

  return (
    <div className="max-w-5xl mx-auto space-y-6">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div>
          {editName ? (
            <div className="flex gap-2">
              <input
                value={nameInput}
                onChange={(e) => setNameInput(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && saveName()}
                autoFocus
                className="bg-maple-panel border border-maple-border rounded px-3 py-1.5 text-xl font-bold focus:outline-none focus:border-maple-accent"
              />
              <button onClick={saveName} className="bg-maple-accent text-slate-900 px-3 rounded font-medium">저장</button>
            </div>
          ) : (
            <h2
              className="text-2xl md:text-3xl font-bold flex items-center gap-2 cursor-pointer hover:text-maple-accent"
              onClick={() => setEditName(true)}
              title="클릭해서 이름 수정"
            >
              👤 {character.name}
              <span className="text-xs text-slate-500 font-normal">(클릭해서 수정)</span>
            </h2>
          )}
          <p className="text-slate-400 mt-1">보스 수익 & 기간제 아이템 관리</p>
        </div>
        <button
          onClick={onRemove}
          className="text-sm text-maple-danger hover:bg-red-500/10 px-3 py-1.5 rounded border border-red-500/30"
        >
          캐릭터 삭제
        </button>
      </div>

      {/* 탭 전환: 보스 수익 / 예산 플래너 */}
      <div className="flex items-center gap-1 bg-maple-panel border border-maple-border rounded-lg p-1 w-fit">
        <TabBtn active={tab === 'boss'} onClick={() => setTab('boss')}>💎 보스 수익 & 기간제</TabBtn>
        <TabBtn active={tab === 'budget'} onClick={() => setTab('budget')}>🧮 예산 플래너</TabBtn>
      </div>

      {tab === 'boss' && (
        <>
          <div className="bg-gradient-to-br from-amber-500/15 to-orange-500/5 border border-maple-accent/30 rounded-xl p-5">
            <div className="text-sm text-slate-300">이 캐릭터의 총 보스 수익</div>
            <div className="text-2xl md:text-4xl font-bold text-maple-accent mt-1 break-all">
              {fmtMeso(totals.total)}
            </div>
            <div className="grid grid-cols-2 gap-3 mt-4">
              <div className="bg-maple-bg/40 rounded-lg px-4 py-3">
                <div className="text-xs text-slate-400">주간 수익</div>
                <div className="text-base md:text-lg font-bold text-sky-300 mt-0.5 break-all">{fmtMeso(totals.weekly)}</div>
              </div>
              <div className="bg-maple-bg/40 rounded-lg px-4 py-3">
                <div className="text-xs text-slate-400">월간 수익</div>
                <div className="text-base md:text-lg font-bold text-violet-300 mt-0.5 break-all">{fmtMeso(totals.monthly)}</div>
              </div>
            </div>
          </div>

          <DurationsPanel durations={character.durations || {}} setDuration={setDuration} />

          <BossRevenueTable
            rows={character.bosses || []}
            bossData={bossData}
            weeklyLimit={WEEKLY_LIMIT}
            onToggle={toggleBoss}
            onSetMembers={setBossMembers}
          />
        </>
      )}

      {tab === 'budget' && (
        <BudgetPlanner
          character={character}
          totals={totals}
          setEquipSlot={setEquipSlot}
          clearEquipSlot={clearEquipSlot}
          setGoals={setGoals}
          setBudgetTotal={setBudgetTotal}
        />
      )}
    </div>
  );
}

      className={`text-sm px-3 py-1.5 rounded-md transition whitespace-nowrap ${

const ICON_GRADIENTS = [

function BossRevenueTable({ rows, bossData, weeklyLimit, onToggle, onSetMembers }) {
  const [sortMode, setSortMode] = useState('natural');

  // 전체 (보스 × 난이도) 엔트리 평탄화
  const entries = useMemo(() => {
    const arr = [];
    for (const boss of bossData) {
      for (const diff of Object.keys(boss.difficulties)) {
        const { price, max } = getDifficultyEntry(boss, diff);
        arr.push({
          bossId: boss.id,
          bossName: boss.name,
          icon: boss.icon,
          level: boss.level,
          monthly: !!boss.monthly,
          difficulty: diff,
          price,
          max,
        });
      }
    }
    return arr;
  }, [bossData]);

  const sortedEntries = useMemo(() => {
    const e = [...entries];
    if (sortMode === 'price_desc') {
      e.sort((a, b) => b.price - a.price);
    } else if (sortMode === 'price_asc') {
      e.sort((a, b) => a.price - b.price);
    } else {
      const bossOrder = bossData.map(b => b.id);
      e.sort((a, b) => {
        const ai = bossOrder.indexOf(a.bossId);
        const bi = bossOrder.indexOf(b.bossId);
        if (ai !== bi) return ai - bi;
        return (DIFF_ORDER[a.difficulty] ?? 99) - (DIFF_ORDER[b.difficulty] ?? 99);
      });
    }
    return e;
  }, [entries, sortMode, bossData]);

  const selectedMap = useMemo(() => {
    const m = {};
    for (const r of rows) m[`${r.bossId}_${r.difficulty}`] = r;
    return m;
  }, [rows]);

  // 현재 선택된 보스 id 집합 (같은 보스 난이도 변경 허용 판정에 사용)
  const selectedBossIds = useMemo(() => new Set(rows.map(r => r.bossId)), [rows]);

  // 월간 보스 id 집합
  const monthlyIds = useMemo(() => {
    const s = new Set();
    for (const b of bossData) if (b.monthly) s.add(b.id);
    return s;
  }, [bossData]);

  // 주간 한도 카운트: 월간 보스는 제외
  const selectedRows = Object.values(selectedMap);
  const weeklyCount = selectedRows.filter(r => !monthlyIds.has(r.bossId)).length;
  const monthlyCount = selectedRows.filter(r => monthlyIds.has(r.bossId)).length;
  const isFull = weeklyCount >= weeklyLimit;

  const revenue = useMemo(() => {
    let weekly = 0, monthly = 0;
    for (const r of rows) {
      const boss = bossData.find(b => b.id === r.bossId);
      if (!boss) continue;
      const { price, max } = getDifficultyEntry(boss, r.difficulty);
      const members = Math.min(Math.max(1, r.partyMembers || 1), max);
      const rev = Math.floor(price / members);
      if (boss.monthly) monthly += rev;
      else weekly += rev;
    }
    return { weekly, monthly, total: weekly + monthly };
  }, [rows, bossData]);

  return (
    <div className="bg-maple-panel border border-maple-border rounded-xl p-4 md:p-5">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h3 className="font-semibold flex items-center gap-2">
            <span>💎</span> 보스 결정석 수익
          </h3>
          <div className="text-xs text-slate-400 mt-1">
            주간 보스는 캐릭터당 최대 12개까지. 한 보스는 한 난이도만 선택할 수 있습니다. 월간 보스(검은 마법사)는 한도에서 제외됩니다.
          </div>

function BossDataEditor({ bossData, setBossData }) {
  const updateField = (bossId, diff, field, raw) => {
    const num = parseInt(String(raw).replace(/[^0-9]/g, '')) || 0;
    setBossData(prev => prev.map(b => {
      if (b.id !== bossId) return b;
      const cur = getDifficultyEntry(b, diff);
      const next = { ...cur, [field]: num };
      if (field === 'max') next.max = Math.min(Math.max(1, next.max), 6);
      return {
        ...b,
        difficulties: { ...b.difficulties, [diff]: next }
      };
    }));
  };

  const resetAll = () => {
    if (!confirm('모든 보스/가격/입장 인원을 기본값으로 되돌릴까요?')) return;
    setBossData(JSON.parse(JSON.stringify(DEFAULT_BOSSES)));

  return (
    <div className="max-w-5xl mx-auto space-y-6">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div>
          <h2 className="text-2xl md:text-3xl font-bold">💎 결정석 가격 관리</h2>
          <p className="text-slate-400 mt-1">보스/난이도별 결정석 가격과 입장 인원을 수정하면 모든 캐릭터에 자동 반영됩니다.</p>
        </div>
        <button
          onClick={resetAll}
          className="text-sm text-maple-danger border border-red-500/30 hover:bg-red-500/10 px-3 py-1.5 rounded"
        >
          기본값으로 초기화
        </button>
      </div>

      <div className="bg-maple-panel border border-maple-border rounded-xl divide-y divide-maple-border">
        {bossData.map(boss => (
          <div key={boss.id} className="p-4 md:p-5">
            <div className="font-semibold mb-3 flex items-center gap-2">
              <BossIcon id={boss.id} name={boss.name} icon={boss.icon} />
              <span>{boss.name}</span>
              {boss.level && <span className="text-xs text-slate-500 font-normal">Lv.{boss.level}</span>}

                const entry = typeof val === 'number' ? { price: val, max: 6 } : { price: val.price || 0, max: val.max || 6 };
                return (

                    <div className="col-span-3 md:col-span-2 text-sm text-slate-300">{diff}</div>

                      <label className="text-[10px] text-slate-500 block mb-0.5">결정석 가격 (메소)</label>
                      <input
                        type="text"
                        inputMode="numeric"

                      />
                    </div>
                    <div className="col-span-3 md:col-span-3">
                      <label className="text-[10px] text-slate-500 block mb-0.5">최대 입장</label>
                      <select

/* =========================================================
 * 예산 플래너 (장비창 + 목표치 + 예산 우선순위)
 * ========================================================= */
const fmtMesoShort = (n) => {
  if (!n) return '';
  if (n >= 100000000) {
    const v = n / 100000000;
    return (Number.isInteger(v) ? v : v.toFixed(1).replace(/\.0$/, '')) + '억';
  }
  if (n >= 10000) return Math.round(n / 10000).toLocaleString() + '만';
  return n.toLocaleString();
};

function MesoInput({ value, onChange, placeholder, className }) {
  return (
    <input
      type="text"
      inputMode="numeric"
      value={value ? Number(value).toLocaleString() : ''}
      placeholder={placeholder || '0'}
      onChange={(e) => onChange(parseNum(e.target.value))}
      className={className || 'w-full bg-maple-bg border border-maple-border rounded px-2 py-1.5 text-sm text-right focus:outline-none focus:border-maple-accent'}
    />
  );
}

function ProgressBar({ value, tone }) {
  const pct = Math.max(0, Math.min(100, value || 0));
  const color = tone || 'bg-maple-accent';
  return (
    <div className="w-full h-2 bg-maple-bg rounded-full overflow-hidden">
      <div className={`h-full ${color} transition-all`} style={{ width: pct + '%' }} />
    </div>
  );
}

function BudgetPlanner({ character, totals, setEquipSlot, clearEquipSlot, setGoals, setBudgetTotal }) {
  const equipment = character.equipment || {};
  const goals = character.goals || emptyGoals();
  const budget = character.budget || { total: 0 };
  const [editingSlot, setEditingSlot] = useState(null);

  // 예산 라인 아이템 집계 (장비 + 심볼 + 솔 에르다)
  const lineItems = useMemo(() => {
    const items = [];
    for (const slot of EQUIP_SLOTS) {
      const e = equipment[slot.id];
      if (e && ((e.cost || 0) > 0 || (e.item && e.item.trim()))) {
        items.push({
          key: 'eq_' + slot.id, type: 'equip', slotId: slot.id,
          name: slot.name, label: e.item || '', star: e.star, potential: e.potential,
          cost: e.cost || 0, priority: e.priority || 0, done: !!e.done,
        });
      }
    }
    const symCost = calcSymbolCost(goals.symbols);
    if (symCost > 0) {
      items.push({ key: 'symbols', type: 'symbols', name: '심볼 강화', label: '아케인 · 어센틱 · 그랜드',
        cost: symCost, priority: goals.symbols.priority || 0, done: !!goals.symbols.done });
    }
    const solCost = calcSolErdaCost(goals.solErda);
    if (solCost > 0) {
      items.push({ key: 'solerda', type: 'solerda', name: '솔 에르다 조각',
        label: `${solErdaNeed(goals.solErda).toLocaleString()}개 × ${fmtMesoShort(parseNum(goals.solErda?.fragPrice))}`,
        cost: solCost, priority: goals.solErda.priority || 0, done: !!goals.solErda.done });
    }
    const pr = (p) => (p && p > 0 ? p : Infinity);
    items.sort((a, b) => pr(a.priority) - pr(b.priority) || b.cost - a.cost);
    return items;
  }, [equipment, goals]);

  const totalCost = lineItems.reduce((a, it) => a + it.cost, 0);
  const doneCost = lineItems.reduce((a, it) => a + (it.done ? it.cost : 0), 0);
  const remaining = Math.max(0, totalCost - doneCost);
  const progressPct = totalCost > 0 ? (doneCost / totalCost) * 100 : 0;

  // 보스 주간 수익 연동: 남은 비용 달성까지 예상 기간
  const weeklyIncome = totals.weekly || 0;
  const weeksToGoal = remaining > 0 && weeklyIncome > 0 ? Math.ceil(remaining / weeklyIncome) : null;
  const monthsToGoal = weeksToGoal ? (weeksToGoal / 4.345).toFixed(1).replace(/\.0$/, '') : null;

  const budgetTotal = budget.total || 0;
  const overBudget = budgetTotal > 0 && totalCost > budgetTotal;

  const toggleDone = (item) => {
    if (item.type === 'equip') setEquipSlot(item.slotId, { done: !item.done });
    else if (item.type === 'symbols') setGoals(g => ({ ...g, symbols: { ...g.symbols, done: !g.symbols.done } }));
    else if (item.type === 'solerda') setGoals(g => ({ ...g, solErda: { ...g.solErda, done: !g.solErda.done } }));
  };
  const setPriority = (item, n) => {
    if (item.type === 'equip') setEquipSlot(item.slotId, { priority: n });
    else if (item.type === 'symbols') setGoals(g => ({ ...g, symbols: { ...g.symbols, priority: n } }));
    else if (item.type === 'solerda') setGoals(g => ({ ...g, solErda: { ...g.solErda, priority: n } }));
  };
  // 예산 우선순위 ▲▼ 이동: 두 항목 위치를 바꾸고 1..N으로 우선순위 재부여
  const move = (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j >= lineItems.length) return;
    const arr = [...lineItems];
    const tmp = arr[idx]; arr[idx] = arr[j]; arr[j] = tmp;
    arr.forEach((it, i) => setPriority(it, i + 1));
  };

  const priorityTable = (
    <div className="bg-maple-panel border border-maple-border rounded-xl p-4 md:p-5">
      <h3 className="font-semibold mb-1 flex items-center gap-2"><span>📋</span> 예산 우선순위</h3>
      <p className="text-xs text-slate-400 mb-4">▲▼ 버튼으로 순서를 조절하고, 완료한 항목은 체크하세요.</p>
      {lineItems.length === 0 ? (
        <div className="text-center py-8 text-slate-500 text-sm">
          비용이 입력된 항목이 없습니다. 장비 슬롯이나 목표치에 예상 비용을 입력해 보세요.
        </div>
      ) : (
        <>
          <div className="hidden md:grid grid-cols-12 gap-2 text-xs text-slate-400 px-2 py-2 border-b border-maple-border">
            <div className="col-span-2 text-center">순위</div>
            <div className="col-span-1 text-center">완료</div>
            <div className="col-span-4">항목</div>
            <div className="col-span-3 text-right">예상 비용</div>
            <div className="col-span-2 text-right">누적</div>
          </div>
          <div className="divide-y divide-maple-border">
            {(() => {
              let cum = 0;
              return lineItems.map((it, idx) => {
                cum += it.cost;
                return (
                  <div key={it.key} className={`grid grid-cols-12 gap-2 items-center px-2 py-2.5 ${it.done ? 'opacity-50' : ''}`}>
                    <div className="col-span-3 md:col-span-2 flex items-center gap-1.5 justify-start md:justify-center">
                      <span className="text-sm font-bold text-maple-accent w-4 text-center">{idx + 1}</span>
                      <div className="flex flex-col leading-none">
                        <button type="button" onClick={() => move(idx, -1)} disabled={idx === 0}
                          className="px-1 text-slate-300 hover:text-white disabled:opacity-20">▲</button>
                        <button type="button" onClick={() => move(idx, 1)} disabled={idx === lineItems.length - 1}
                          className="px-1 text-slate-300 hover:text-white disabled:opacity-20">▼</button>
                      </div>
                    </div>
                    <div className="col-span-2 md:col-span-1 flex items-center justify-center">
                      <input type="checkbox" checked={it.done} onChange={() => toggleDone(it)} className="w-5 h-5 accent-emerald-400 cursor-pointer" />
                    </div>
                    <div className="col-span-7 md:col-span-4 min-w-0">
                      <div className={`font-medium truncate ${it.done ? 'line-through text-slate-400' : 'text-slate-100'}`}>
                        {it.name}
                        {it.type === 'equip' && it.star ? <span className="text-amber-300 text-xs ml-1">★{it.star}</span> : null}
                      </div>
                      {it.label && <div className="text-xs text-slate-500 truncate">{it.label}</div>}
                    </div>
                    <div className="col-span-7 md:col-span-3 text-right font-semibold text-emerald-300 text-sm md:text-base">{fmtMeso(it.cost)}</div>
                    <div className="col-span-5 md:col-span-2 text-right text-xs text-slate-400">{fmtMesoShort(cum)}</div>
                  </div>
                );
              });
            })()}
          </div>
          <div className="border-t-2 border-maple-border mt-3 pt-3 flex items-center justify-between">
            <div className="font-semibold">합계</div>
            <div className="font-bold text-emerald-300 text-base md:text-lg">{fmtMeso(totalCost)}</div>
          </div>
        </>
      )}
    </div>
  );

  return (
    <div className="space-y-6">
      {/* 예산 요약 */}
      <div className="bg-gradient-to-br from-emerald-500/15 to-sky-500/5 border border-emerald-500/30 rounded-xl p-5">
        <div className="flex items-start justify-between gap-3 flex-wrap">
          <div>
            <div className="text-sm text-slate-300">목표 달성 총 예산</div>
            <div className="text-2xl md:text-4xl font-bold text-emerald-300 mt-1 break-all">{fmtMeso(totalCost)}</div>
          </div>
          <div className="text-right">
            <div className="text-xs text-slate-400">남은 비용</div>
            <div className="text-lg md:text-2xl font-bold text-maple-accent break-all">{fmtMeso(remaining)}</div>
          </div>
        </div>

        <div className="mt-4">
          <div className="flex items-center justify-between text-xs text-slate-400 mb-1">
            <span>진행률 (완료 {fmtMeso(doneCost)})</span>
            <span>{progressPct.toFixed(0)}%</span>
          </div>
          <ProgressBar value={progressPct} tone="bg-emerald-400" />
        </div>

        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 mt-4">
          <div className="bg-maple-bg/40 rounded-lg px-4 py-3">
            <div className="text-xs text-slate-400">주간 보스 수익</div>
            <div className="text-sm md:text-base font-bold text-sky-300 mt-0.5 break-all">{fmtMeso(weeklyIncome)}</div>
          </div>
          <div className="bg-maple-bg/40 rounded-lg px-4 py-3">
            <div className="text-xs text-slate-400">달성까지 (수익 연동)</div>
            <div className="text-sm md:text-base font-bold text-maple-accent mt-0.5">
              {weeksToGoal ? `약 ${weeksToGoal}주 (${monthsToGoal}개월)` : remaining === 0 ? '🎉 달성!' : '수익 입력 필요'}
            </div>
          </div>
          <div className="bg-maple-bg/40 rounded-lg px-4 py-3 col-span-2 sm:col-span-1">
            <div className="text-xs text-slate-400">예산 한도 (선택)</div>
            <MesoInput
              value={budgetTotal}
              onChange={setBudgetTotal}
              className="w-full bg-maple-bg border border-maple-border rounded px-2 py-1 text-sm text-right mt-0.5 focus:outline-none focus:border-maple-accent"
            />
          </div>
        </div>
        {overBudget && (
          <div className="mt-3 bg-red-500/10 border border-red-500/40 text-red-200 text-xs rounded px-3 py-2">
            ⚠️ 목표 총 예산({fmtMeso(totalCost)})이 설정한 한도({fmtMeso(budgetTotal)})를 {fmtMeso(totalCost - budgetTotal)} 초과했습니다.
          </div>
        )}
      </div>

      {/* 예산 우선순위 — 요약 바로 아래 */}
      {priorityTable}

      {/* 장비창 - 본게임 EQUIPMENT 창 UI */}
      <div>
        <p className="text-xs text-slate-400 mb-3 text-center">슬롯을 눌러 목표 장비를 검색하고 스타포스·잠재·플레임·예상 비용을 입력하세요.</p>
        <div className="bg-[#243042] border-2 border-black/40 rounded-xl overflow-hidden max-w-2xl mx-auto shadow-xl">
          {/* 타이틀 바 */}
          <div className="bg-[#2c3a4f] px-4 py-2.5 flex items-center justify-between">
            <span className="font-extrabold tracking-wide text-slate-100">EQUIPMENT</span>
            <span className="text-xs font-bold text-slate-300 bg-[#3b4a61] border border-slate-500/50 rounded px-3 py-1">치장 ›</span>
          </div>
          {/* 보드 */}
          <div className="p-3 md:p-4 flex justify-center items-start gap-2 md:gap-3">
            <div className="grid grid-cols-2 gap-1.5 md:gap-2">
              {EQUIP_LEFT.flat().map((slotId, i) => (
                <EquipSlotCell key={i} slot={{ id: slotId, name: EQUIP_SLOT_NAME[slotId] }} data={equipment[slotId]} onClick={() => setEditingSlot(slotId)} />
              ))}
            </div>
            <div className="flex flex-col items-center justify-between self-stretch">
              <div className="flex-1 w-[124px] md:w-[164px] bg-[#0e1726] border border-slate-600/50 rounded-lg flex flex-col items-center justify-center py-3">
                <svg width="46" height="60" viewBox="0 0 46 60" className="opacity-70">
                  <circle cx="23" cy="16" r="13" fill="#cbd5e1" />
                  <path d="M5 56 q18 -30 36 0 z" fill="#94a3b8" />
                </svg>
                <div className="text-[10px] text-slate-500 mt-2">캐릭터 미리보기</div>
              </div>
              <div className="flex gap-1.5 md:gap-2 mt-1.5 md:mt-2">
                <EquipSlotCell slot={{ id: 'weapon', name: '무기' }} data={equipment.weapon} onClick={() => setEditingSlot('weapon')} />
                <EquipSlotCell slot={{ id: 'subweapon', name: '보조무기' }} data={equipment.subweapon} onClick={() => setEditingSlot('subweapon')} />
              </div>
            </div>
            <div className="grid grid-cols-2 gap-1.5 md:gap-2">
              {EQUIP_RIGHT.flat().map((slotId, i) => (
                slotId
                  ? <EquipSlotCell key={i} slot={{ id: slotId, name: EQUIP_SLOT_NAME[slotId] }} data={equipment[slotId]} onClick={() => setEditingSlot(slotId)} />
                  : <div key={i} className="w-[60px] h-[60px] md:w-[76px] md:h-[76px]" />
              ))}
            </div>
          </div>
          {/* PRESETS 바 (표시용) */}
          <div className="bg-[#2c3a4f]/70 border-t border-black/30 px-4 py-2.5 flex items-center justify-between">
            <span className="text-xs font-bold text-slate-400 tracking-wide">PRESETS</span>
            <span className="text-[11px] text-slate-500">장비 프리셋 (게임 내 기능)</span>

      {editingSlot && (
        <SlotEditorModal
          slot={{ id: editingSlot, name: EQUIP_SLOT_NAME[editingSlot] }}
          data={equipment[editingSlot] || emptyEquipSlot()}
          onChange={(patch) => setEquipSlot(editingSlot, patch)}
          onClear={() => { clearEquipSlot(editingSlot); setEditingSlot(null); }}
          onClose={() => setEditingSlot(null)}
        />
      )}
    </div>
  );
}

function EquipSlotCell({ slot, data, onClick }) {
  const d = normSlot(data);
  const filled = data && ((d.cost || 0) > 0 || (d.item && d.item.trim()));
  const potColor = d.potential && d.potential !== '미설정' ? POTENTIAL_STYLE[d.potential] : '';
  return (
    <button
      onClick={onClick}
      title={slot.name}
      className={`relative w-[60px] h-[60px] md:w-[76px] md:h-[76px] rounded-lg border p-1 flex flex-col items-center justify-center text-center transition overflow-hidden ${
        filled
          ? 'bg-[#1b2536] border-maple-accent/60 hover:border-maple-accent'
          : 'bg-[#16202f] border-dashed border-slate-600/70 hover:border-maple-accent/60'
      }`}
    >
      {filled ? (
        <>
          <div className="text-[8px] md:text-[9px] text-slate-500 leading-none mb-0.5">{slot.name}</div>
          <div className="text-[9px] md:text-[10px] font-medium text-slate-100 leading-tight line-clamp-2 px-0.5">{d.item || '—'}</div>
          <div className="flex items-center gap-1 mt-0.5">
            {d.star ? <span className="text-[9px] md:text-[10px] text-amber-300 font-bold">★{d.star}</span> : null}
            {d.potTarget ? <span className={`text-[9px] md:text-[10px] font-bold ${potColor || 'text-lime-300'}`}>{d.potTarget}</span> : null}
          </div>
          {d.cost ? <div className="text-[8px] md:text-[10px] text-emerald-300 font-semibold leading-none">{fmtMesoShort(d.cost)}</div> : null}
          {(d.flameDone || d.jakDone) ? (
            <div className="flex items-center gap-0.5 mt-0.5">
              {d.flameDone ? <span className="text-[8px] text-emerald-400 font-bold">추✓</span> : null}
              {d.jakDone ? <span className="text-[8px] text-sky-400 font-bold">작✓</span> : null}
            </div>
          ) : null}
          {d.done ? <div className="absolute top-0.5 right-1 text-[9px] text-emerald-400 font-bold">✓</div> : null}
        </>
      ) : (
        <>
          <div className="text-[9px] md:text-[10px] text-slate-500 leading-tight">{slot.name}</div>
          <div className="text-slate-600 text-base leading-none mt-0.5">+</div>
        </>
      )}
    </button>
  );
}

const INPUT_CLS = 'w-full bg-maple-bg border border-maple-border rounded px-3 py-2 text-sm focus:outline-none focus:border-maple-accent';

function TargetSelect({ targets, value, onChange }) {
  const has = !value || targets.includes(value);
  return (
    <select value={value || ''} onChange={(e) => onChange(e.target.value)} className={INPUT_CLS}>
      <option value="">목표 미설정</option>
      {targets.map(o => <option key={o} value={o}>{o}</option>)}
      {!has && <option value={value}>{value}</option>}
    </select>
  );
}

function SlotEditorModal({ slot, data, onChange, onClear, onClose }) {
  const d = normSlot(data);
  const cap = SLOT_CAP[slot.id] || { star: true, pot: true, addpot: true, flame: true, soul: false };
  const targets = getPotTargets(slot.id);

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60" onClick={onClose}>
      <div className="bg-maple-panel border border-maple-border rounded-xl w-full max-w-md p-5 max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="font-bold text-lg">{slot.name} 슬롯</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-white p-1">✕</button>
        </div>

        <div className="space-y-4">
          {/* 아이템명 직접 입력 */}
          <div>
            <label className="text-sm text-slate-300 block mb-1.5">목표 아이템명</label>
            <input
              type="text" value={d.item} placeholder="예: 에테르넬 나이트로드 모자"
              onChange={(e) => onChange({ item: e.target.value })}
              className={INPUT_CLS}
            />
          </div>

          <div className="text-[11px] text-slate-500 -mt-1">── 목표 스펙 (이 부위에 적용되는 항목만 표시) ──</div>

          <div className="grid grid-cols-2 gap-3">
            {cap.star && (
              <div>
                <label className="text-sm text-slate-300 block mb-1.5">목표 스타포스</label>
                <input
                  type="number" min="0" max="30" value={d.star} placeholder="0"
                  onChange={(e) => onChange({ star: Math.min(30, Math.max(0, parseNum(e.target.value))) })}
                  className={INPUT_CLS}
                />
              </div>
            )}
            {cap.pot && (
              <div>
                <label className="text-sm text-slate-300 block mb-1.5">목표 잠재등급</label>
                <select value={d.potential} onChange={(e) => onChange({ potential: e.target.value })} className={INPUT_CLS}>
                  {POTENTIAL_GRADES.map(g => <option key={g} value={g}>{g}</option>)}
                </select>
              </div>
            )}
          </div>

          {cap.pot && (
            <div>
              <label className="text-sm text-slate-300 block mb-1.5">
                잠재 목표 {slot.id === 'glove' ? '(장갑: 크크 = 크뎀 2줄)' : '(2줄·3줄·이탈 표기)'}
              </label>
              <TargetSelect targets={targets} value={d.potTarget} onChange={(v) => onChange({ potTarget: v })} />
            </div>
          )}

          {cap.addpot && (
            <div>
              <label className="text-sm text-slate-300 block mb-1.5">에디셔널 잠재 목표</label>
              <TargetSelect targets={targets} value={d.addPotTarget} onChange={(v) => onChange({ addPotTarget: v })} />
            </div>
          )}

          {(cap.flame || cap.jak) && (
            <div className="flex gap-2">
              {cap.flame && (
                <button type="button" onClick={() => onChange({ flameDone: !d.flameDone })}
                  className={`flex-1 rounded border px-3 py-2 text-sm font-semibold transition ${d.flameDone ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-300' : 'bg-maple-bg border-maple-border text-slate-400'}`}>
                  추옵 {d.flameDone ? '완료 ✓' : '미완료'}
                </button>
              )}
              {cap.jak && (
                <button type="button" onClick={() => onChange({ jakDone: !d.jakDone })}
                  className={`flex-1 rounded border px-3 py-2 text-sm font-semibold transition ${d.jakDone ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-300' : 'bg-maple-bg border-maple-border text-slate-400'}`}>
                  작 {d.jakDone ? '완료 ✓' : '미완료'}
                </button>
              )}

          )}

          {cap.soul && (
            <div>
              <label className="text-sm text-slate-300 block mb-1.5">소울 (무기)</label>
              <input type="text" value={d.soul} placeholder="예: 위대한 데미안의 소울 · 공격력 +x"
                onChange={(e) => onChange({ soul: e.target.value })} className={INPUT_CLS} />
            </div>
          )}

          <div className="text-[11px] text-slate-500 -mb-1">── 예산 ──</div>
          <div>
            <label className="text-sm text-slate-300 block mb-1.5">예상 비용 (메소)</label>
            <MesoInput value={d.cost || 0} onChange={(n) => onChange({ cost: n })} />
            <p className="text-[11px] text-slate-500 mt-1">※ 우선순위는 예산 우선순위 표에서 ▲▼로 조절합니다.</p>
          </div>

          <div>
            <label className="text-sm text-slate-300 block mb-1.5">메모</label>
            <input type="text" value={d.memo} placeholder="예: 보스 잠재 / 추옵 후 강화"
              onChange={(e) => onChange({ memo: e.target.value })} className={INPUT_CLS} />
          </div>

          <label className="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked={!!d.done} onChange={(e) => onChange({ done: e.target.checked })} className="w-5 h-5 accent-emerald-400" />
            <span className="text-sm text-slate-300">완료됨</span>
          </label>
        </div>

        <div className="flex items-center justify-between mt-6 pt-4 border-t border-maple-border">
          <button onClick={onClear} className="text-sm text-maple-danger border border-red-500/30 hover:bg-red-500/10 px-3 py-1.5 rounded">슬롯 비우기</button>
          <button onClick={onClose} className="bg-maple-accent text-slate-900 font-semibold px-4 py-1.5 rounded hover:bg-amber-300">완료</button>
        </div>
      </div>
    </div>
  );
}

function SymbolRow({ name, value, max, onChange }) {
  const cur = parseNum(value.cur);
  const tgt = parseNum(value.tgt);
  const pct = tgt > 0 ? Math.min(100, (cur / tgt) * 100) : 0;
  return (
    <div className="flex items-center gap-2">
      <div className="w-20 md:w-24 text-xs text-slate-300 truncate flex-shrink-0">{name}</div>
      <input type="number" min="0" max={max} value={value.cur} placeholder="현재"
        onChange={(e) => onChange({ ...value, cur: Math.min(max, Math.max(0, parseNum(e.target.value))) })}
        className="w-14 bg-maple-bg border border-maple-border rounded px-2 py-1 text-sm text-center focus:outline-none focus:border-maple-accent" />
      <span className="text-slate-500 text-xs">→</span>
      <input type="number" min="0" max={max} value={value.tgt} placeholder="목표"
        onChange={(e) => onChange({ ...value, tgt: Math.min(max, Math.max(0, parseNum(e.target.value))) })}
        className="w-14 bg-maple-bg border border-maple-border rounded px-2 py-1 text-sm text-center focus:outline-none focus:border-maple-accent" />
      <div className="flex-1 min-w-0 hidden sm:block"><ProgressBar value={pct} tone="bg-sky-400" /></div>
    </div>
  );
}

function GoalsPanel({ goals, setGoals }) {
  const lvl = goals.level || { current: '', target: '' };
  const lvlCur = parseNum(lvl.current), lvlTgt = parseNum(lvl.target);
  const lvlPct = lvlTgt > 0 ? Math.min(100, (lvlCur / lvlTgt) * 100) : 0;

  const setArcane = (id, v) => setGoals(g => ({ ...g, symbols: { ...g.symbols, arcane: { ...g.symbols.arcane, [id]: v } } }));
  const setAuthentic = (id, v) => setGoals(g => ({ ...g, symbols: { ...g.symbols, authentic: { ...g.symbols.authentic, [id]: v } } }));
  const setGrand = (id, v) => setGoals(g => ({ ...g, symbols: { ...g.symbols, grand: { ...(g.symbols.grand || {}), [id]: v } } }));
  const symbolCost = calcSymbolCost(goals.symbols);

  return (
    <div className="bg-maple-panel border border-maple-border rounded-xl p-4 md:p-5 space-y-6">
      <h3 className="font-semibold flex items-center gap-2"><span>🎯</span> 목표치</h3>

      {/* 레벨 */}
      <div>
        <div className="text-sm font-medium text-slate-300 mb-2 flex items-center gap-2"><span>⬆️</span> 레벨</div>
        <div className="flex items-center gap-2">
          <input type="number" min="1" max="300" value={lvl.current} placeholder="현재 레벨"
            onChange={(e) => setGoals(g => ({ ...g, level: { ...g.level, current: parseNum(e.target.value) } }))}
            className="w-24 bg-maple-bg border border-maple-border rounded px-3 py-2 text-sm text-center focus:outline-none focus:border-maple-accent" />
          <span className="text-slate-500">→</span>
          <input type="number" min="1" max="300" value={lvl.target} placeholder="목표 레벨"
            onChange={(e) => setGoals(g => ({ ...g, level: { ...g.level, target: parseNum(e.target.value) } }))}
            className="w-24 bg-maple-bg border border-maple-border rounded px-3 py-2 text-sm text-center focus:outline-none focus:border-maple-accent" />
          <div className="flex-1 min-w-0"><ProgressBar value={lvlPct} tone="bg-amber-400" /></div>
        </div>
      </div>

      {/* 심볼 */}
      <div className="pt-4 border-t border-maple-border">
        <div className="text-sm font-medium text-slate-300 mb-3 flex items-center gap-2"><span>🔮</span> 심볼 (현재 → 목표 레벨)</div>
        <div className="grid md:grid-cols-2 gap-x-6 gap-y-2">
          <div className="space-y-2">
            <div className="text-xs text-sky-300 font-semibold">아케인심볼 (최대 {ARCANE_MAX})</div>
            {ARCANE_REGIONS.map(r => (
              <SymbolRow key={r.id} name={r.name} max={ARCANE_MAX} value={goals.symbols.arcane[r.id] || { cur: '', tgt: '' }} onChange={(v) => setArcane(r.id, v)} />
            ))}
          </div>
          <div className="space-y-2 mt-3 md:mt-0">
            <div className="text-xs text-violet-300 font-semibold">어센틱심볼 (최대 {AUTHENTIC_MAX})</div>
            {AUTHENTIC_REGIONS.map(r => (
              <SymbolRow key={r.id} name={r.name} max={AUTHENTIC_MAX} value={goals.symbols.authentic[r.id] || { cur: '', tgt: '' }} onChange={(v) => setAuthentic(r.id, v)} />
            ))}
          </div>
        </div>
        <div className="mt-4">
          <div className="text-xs text-rose-300 font-semibold mb-2">그랜드 어센틱심볼 (최대 {GRAND_MAX})</div>
          <div className="grid md:grid-cols-2 gap-x-6 gap-y-2">
            {GRAND_REGIONS.map(r => (
              <SymbolRow key={r.id} name={r.name} max={GRAND_MAX} value={(goals.symbols.grand || {})[r.id] || { cur: '', tgt: '' }} onChange={(v) => setGrand(r.id, v)} />
            ))}
          </div>
        </div>
        <div className="mt-4 bg-maple-bg/50 border border-maple-border rounded-lg px-4 py-2.5 flex items-center justify-between">
          <div className="text-[11px] text-slate-400">심볼 강화 예상 비용 (현재→목표 자동계산)</div>
          <div className="text-base font-bold text-emerald-300">{fmtMeso(symbolCost)}</div>
        </div>
        <p className="text-[11px] text-slate-500 mt-2">※ 아케인·어센틱·그랜드 어센틱 전 지역 정확 가격표 기준으로 자동 계산됩니다.</p>
      </div>

      {/* 솔 에르다 */}
      <div className="pt-4 border-t border-maple-border">
        <div className="text-sm font-medium text-slate-300 mb-3 flex items-center gap-2"><span>🌟</span> 솔 에르다 / 조각 (6차 스킬)</div>
        <div className="grid grid-cols-2 gap-x-6 gap-y-3">
          <div>
            <label className="text-xs text-slate-400 block mb-1">솔 에르다 (현재 → 목표)</label>
            <div className="flex items-center gap-2">
              <input type="number" min="0" value={goals.solErda.erdaCur} placeholder="현재"
                onChange={(e) => setGoals(g => ({ ...g, solErda: { ...g.solErda, erdaCur: parseNum(e.target.value) } }))}
                className="w-16 bg-maple-bg border border-maple-border rounded px-2 py-1 text-sm text-center focus:outline-none focus:border-maple-accent" />
              <span className="text-slate-500 text-xs">→</span>
              <input type="number" min="0" value={goals.solErda.erdaTgt} placeholder="목표"
                onChange={(e) => setGoals(g => ({ ...g, solErda: { ...g.solErda, erdaTgt: parseNum(e.target.value) } }))}
                className="w-16 bg-maple-bg border border-maple-border rounded px-2 py-1 text-sm text-center focus:outline-none focus:border-maple-accent" />
            </div>
          </div>
          <div>
            <label className="text-xs text-slate-400 block mb-1">솔 에르다 조각 (현재 → 목표)</label>
            <div className="flex items-center gap-2">
              <input type="number" min="0" value={goals.solErda.fragCur} placeholder="현재"
                onChange={(e) => setGoals(g => ({ ...g, solErda: { ...g.solErda, fragCur: parseNum(e.target.value) } }))}
                className="w-16 bg-maple-bg border border-maple-border rounded px-2 py-1 text-sm text-center focus:outline-none focus:border-maple-accent" />
              <span className="text-slate-500 text-xs">→</span>
              <input type="number" min="0" value={goals.solErda.fragTgt} placeholder="목표"
                onChange={(e) => setGoals(g => ({ ...g, solErda: { ...g.solErda, fragTgt: parseNum(e.target.value) } }))}
                className="w-16 bg-maple-bg border border-maple-border rounded px-2 py-1 text-sm text-center focus:outline-none focus:border-maple-accent" />
            </div>
          </div>
        </div>
        <div className="mt-4 max-w-xs">
          <label className="text-xs text-slate-400 block mb-1">조각 1개 가격 (메소)</label>
          <MesoInput value={goals.solErda.fragPrice || 0} onChange={(n) => setGoals(g => ({ ...g, solErda: { ...g.solErda, fragPrice: n } }))} />
        </div>
        <div className="mt-3 bg-maple-bg/50 border border-maple-border rounded-lg px-4 py-3 flex items-center justify-between">
          <div className="text-xs text-slate-400">
            예상 비용 = 필요 <span className="text-slate-200 font-semibold">{solErdaNeed(goals.solErda).toLocaleString()}</span>개
            <span className="text-slate-500"> (목표 {parseNum(goals.solErda.fragTgt).toLocaleString()} − 현재 {parseNum(goals.solErda.fragCur).toLocaleString()})</span>
            {' × '}{fmtMeso(parseNum(goals.solErda.fragPrice))}
          </div>
          <div className="text-base font-bold text-emerald-300">{fmtMeso(calcSolErdaCost(goals.solErda))}</div>
        </div>
      </div>
    </div>
  );
}

/* =========================================================
 * 심볼 가격 (레벨별 강화비용 기록)
 * ========================================================= */
function SymbolCostTable({ title, accent, regions, table, maxLevel }) {
  const levels = [];
  for (let L = 2; L <= maxLevel; L++) levels.push(L);
  return (
    <div className="bg-maple-panel border border-maple-border rounded-xl p-4 md:p-5">
      <h3 className={`font-semibold mb-3 ${accent}`}>{title}</h3>
      <div className="overflow-x-auto">
        <table className="w-full text-[11px] md:text-xs border-collapse min-w-[640px]">
          <thead>
            <tr className="text-slate-400 border-b border-maple-border">
              <th className="text-left py-1.5 px-2 sticky left-0 bg-maple-panel">도달</th>
              {regions.map(r => <th key={r.id} className="text-right py-1.5 px-2 whitespace-nowrap">{r.name}</th>)}
            </tr>
          </thead>
          <tbody>
            {levels.map(L => (
              <tr key={L} className="border-b border-maple-border/40">
                <td className="py-1 px-2 text-slate-300 sticky left-0 bg-maple-panel">{L}렙</td>
                {regions.map(r => {
                  const arr = table[r.id] || [];
                  const step = (arr[L] || 0) - (arr[L - 1] || 0);
                  return <td key={r.id} className="text-right py-1 px-2 text-slate-200 tabular-nums">{step.toLocaleString()}</td>;
                })}
              </tr>
            ))}
            <tr className="border-t-2 border-maple-border font-bold">
              <td className="py-1.5 px-2 text-maple-accent sticky left-0 bg-maple-panel">합계</td>
              {regions.map(r => {
                const arr = table[r.id] || [];
                return <td key={r.id} className="text-right py-1.5 px-2 text-emerald-300 tabular-nums">{(arr[maxLevel] || 0).toLocaleString()}</td>;
              })}
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

function SymbolPriceView() {
  const arcaneTotal = ARCANE_REGIONS.reduce((a, r) => a + (ARCANE_COST[r.id]?.[ARCANE_MAX] || 0), 0);
  const authTotal = AUTHENTIC_REGIONS.reduce((a, r) => a + (AUTHENTIC_COST[r.id]?.[AUTHENTIC_MAX] || 0), 0);
  const grandTotal = GRAND_REGIONS.reduce((a, r) => a + (GRAND_COST[r.id]?.[GRAND_MAX] || 0), 0);
  return (
    <div className="max-w-5xl mx-auto space-y-6">
      <div>
        <h2 className="text-2xl md:text-3xl font-bold">🔮 심볼 가격</h2>
        <p className="text-slate-400 mt-1">심볼 레벨별 강화비용 기록 (도달 레벨까지 단계별 비용 · 단위 메소)</p>
      </div>

      <div className="bg-gradient-to-br from-violet-500/15 to-sky-500/5 border border-violet-500/30 rounded-xl p-5 grid grid-cols-2 md:grid-cols-4 gap-3">
        <div><div className="text-xs text-slate-400">아케인 6종</div><div className="text-base md:text-lg font-bold text-sky-300 break-all">{fmtMeso(arcaneTotal)}</div></div>
        <div><div className="text-xs text-slate-400">어센틱 6종</div><div className="text-base md:text-lg font-bold text-violet-300 break-all">{fmtMeso(authTotal)}</div></div>
        <div><div className="text-xs text-slate-400">그랜드 어센틱 2종</div><div className="text-base md:text-lg font-bold text-rose-300 break-all">{fmtMeso(grandTotal)}</div></div>
        <div><div className="text-xs text-slate-400">전체 합계 (만렙)</div><div className="text-base md:text-lg font-bold text-maple-accent break-all">{fmtMeso(arcaneTotal + authTotal + grandTotal)}</div></div>
      </div>

      <SymbolCostTable title={`아케인심볼 (1→${ARCANE_MAX}렙)`} accent="text-sky-300" regions={ARCANE_REGIONS} table={ARCANE_COST} maxLevel={ARCANE_MAX} />
      <SymbolCostTable title={`어센틱심볼 (1→${AUTHENTIC_MAX}렙)`} accent="text-violet-300" regions={AUTHENTIC_REGIONS} table={AUTHENTIC_COST} maxLevel={AUTHENTIC_MAX} />
      <SymbolCostTable title={`그랜드 어센틱심볼 (1→${GRAND_MAX}렙)`} accent="text-rose-300" regions={GRAND_REGIONS} table={GRAND_COST} maxLevel={GRAND_MAX} />
    </div>
  );
}
